<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio SEP — Seller Page</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=Spectral:ital,wght@0,400;0,500;1,400;1,500&family=Hanken+Grotesk:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   Studio SEP — Seller Page  ·  Round 3 (the elevation round)
   Bright/airy light-dominant base + 5 light tonal steps, now with
   2 confident DARK proof bands (by-the-numbers, reviews) plus the
   hero & agent for dark/light spine. ONE teal ramp reserved for the
   earned moments. One depth token set. Container-query layout.
   ============================================================ */

:root {
  /* ---- LIGHT tonal ladder ---- */
  --white:    #FCFAF4;
  --offwhite: #F8F3E8;
  --paper:    #F1EADC;
  --sand:     #ECE1CC;
  --mist:     #E3ECEC;

  /* ---- DARK punctuation ---- */
  --ink:      #0C1518;
  --ink-2:    #14242B;
  --ink-3:    #21383F;

  /* ---- ONE teal ramp (mint is the light tip only) ---- */
  --teal-700: #06647D;
  --teal-900: color-mix(in oklab, var(--teal-700), #021216 55%);
  --teal-500: color-mix(in oklab, var(--teal-700), #ffffff 24%);
  --teal-200: color-mix(in oklab, var(--teal-700) 24%, var(--paper));
  --teal-100: color-mix(in oklab, var(--teal-700) 12%, var(--paper));
  --mint:     #4EF2D9;
  --accent:   var(--teal-700);

  /* ---- Text ---- */
  --t-ink:      #1B2A2E;
  --t-body:     #2C3C40;
  --t-soft:     #4C5D61;
  --t-mute:     #74858A;
  --t-pap:      #EFE9DC;
  --t-pap-soft: #B4C0C1;
  --t-pap-mute: #7C8D90;

  /* ---- Hairlines ---- */
  --line:     rgba(20,36,40,.13);
  --line-2:   rgba(20,36,40,.22);
  --line-pap: rgba(239,233,220,.16);

  /* ---- Type ---- */
  --f-display: "Newsreader", Georgia, serif;
  --f-body:    "Hanken Grotesk", system-ui, sans-serif;
  --f-mono:    "IBM Plex Mono", ui-monospace, monospace;

  /* ---- Spacing ---- */
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:24px;
  --s-6:32px; --s-7:48px; --s-8:64px; --s-9:96px; --s-10:128px;

  /* ---- Depth ---- */
  --r-sm:10px; --r-md:16px; --r-lg:22px; --r-xl:30px;
  --lift-1: 0 1px 2px rgba(16,28,30,.05), 0 10px 26px -16px rgba(16,28,30,.28);
  --lift-2: 0 2px 4px rgba(16,28,30,.06), 0 22px 50px -24px rgba(16,28,30,.40);
  --lift-dark: 0 30px 60px -30px rgba(0,0,0,.6);

  /* ---- Motion ---- */
  --ease: cubic-bezier(.2,.6,.2,1);
  --dur: .7s;
}

.pair-spectral { --f-display: "Spectral", Georgia, serif; }

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

/* ---------- PROTOTYPE SHELL ---------- */
.stage { min-height: 100vh; background: #26261f; background-image: radial-gradient(circle at 50% -8%, #34332b 0%, #201f1a 72%); display: flex; flex-direction: column; align-items: center; padding: 0 0 80px; font-family: var(--f-body); }
.topbar { position: sticky; top: 0; z-index: 50; width: 100%; display: flex; align-items: center; justify-content: center; gap: 18px; padding: 14px 18px; background: rgba(18,18,15,.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,.06); }
.topbar .brandtag { position: absolute; left: 20px; font-family: var(--f-mono); font-size: 11px; letter-spacing: .16em; color: #8b8a82; text-transform: uppercase; }
.seg { display: inline-flex; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.09); border-radius: 999px; padding: 3px; }
.seg button { font-family: var(--f-mono); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: #b9b8b0; background: transparent; border: 0; cursor: pointer; padding: 7px 16px; border-radius: 999px; transition: all .18s ease; }
.seg button.on { background: var(--paper); color: #1c1c1a; }
.hint { position: absolute; right: 20px; font-family: var(--f-mono); font-size: 10.5px; letter-spacing: .1em; color: #6f6e67; text-transform: uppercase; }

.frame-wrap { width: 100%; display: flex; justify-content: center; padding: 34px 20px 0; }
.frame { position: relative; background: var(--paper); overflow: hidden; transition: width .42s cubic-bezier(.7,0,.2,1); box-shadow: 0 40px 90px -30px rgba(0,0,0,.65), 0 6px 20px rgba(0,0,0,.3); }
.frame.mobile { width: 402px; border-radius: 44px; padding: 0; border: 9px solid #0c0c0d; }
.frame.desktop { width: 1180px; max-width: 100%; border-radius: 16px; border: 1px solid #0c0c0d; }

.sep { container-type: inline-size; container-name: page; background: var(--paper); color: var(--t-body); font-family: var(--f-body); -webkit-font-smoothing: antialiased; font-size: 17px; line-height: 1.6; }
.frame.mobile .sep { border-radius: 35px; overflow: hidden; }

/* ---------- SHARED PRIMITIVES ---------- */
.eyebrow { font-family: var(--f-mono); font-size: 11.5px; letter-spacing: .2em; text-transform: uppercase; color: var(--t-mute); font-weight: 500; display: flex; align-items: center; gap: 10px; }
.eyebrow .num { color: var(--t-soft); }
.eyebrow.on-dark { color: var(--t-pap-mute); }
.eyebrow .rule { flex: 1; height: 1px; background: var(--line); }
.eyebrow.on-dark .rule { background: var(--line-pap); }

h2.head { font-family: var(--f-display); font-weight: 400; font-size: clamp(33px, 6.6cqi, 54px); line-height: 1.05; letter-spacing: -.015em; color: var(--t-ink); margin: var(--s-5) 0 0; text-wrap: balance; }
h2.head em { font-style: italic; }
.on-dark h2.head, h2.head.on-dark, .z-ink h2.head { color: var(--t-pap); }

.body-lg { font-size: clamp(16.5px, 2.1cqi, 18.5px); line-height: 1.62; color: var(--t-body); }
.lede { font-family: var(--f-display); font-weight: 400; font-size: clamp(20px, 2.9cqi, 26px); line-height: 1.4; color: var(--t-ink); letter-spacing: -.005em; text-wrap: pretty; }
.emph { color: var(--teal-700); }
.body-lg .emph { font-weight: 600; }

.section { padding: clamp(46px, 9cqi, 104px) clamp(22px, 6cqi, 84px); position: relative; }

.z-white { background: var(--white); }
.z-offwhite { background: var(--offwhite); }
.z-paper { background: var(--paper); }
.z-sand { background: var(--sand); }
.z-mist { background: var(--mist); }
.z-ink { background: var(--ink); color: var(--t-pap); }

/* ============================================================ HERO ============================================================ */
.hero { background: var(--ink); color: var(--t-pap); padding-bottom: clamp(70px, 9cqi, 96px); }
.hero__photo { position: relative; width: 100%; aspect-ratio: 4 / 3; background: var(--ink-2); overflow: hidden; }
.hero__photo image-slot { width: 100%; height: 100%; display: block; }
.hero__slot { position: absolute; inset: 0; z-index: 1; }
.hero__pers { position: absolute; top: 16px; left: 0; right: 0; z-index: 2; text-align: center; font-family: var(--f-mono); font-size: 10.5px; letter-spacing: .22em; text-transform: uppercase; color: var(--t-pap-soft); display: flex; align-items: center; justify-content: center; gap: 9px; }
.hero__pers .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--mint); }
.hero__band { padding: clamp(28px,6cqi,48px) clamp(22px,6cqi,84px) 0; }
.hero__eyebrow { font-family: var(--f-mono); font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--t-pap-mute); margin-bottom: 18px; }
.hero__addr { font-family: var(--f-display); font-weight: 400; font-size: clamp(38px, 8.6cqi, 80px); line-height: 1.0; letter-spacing: -.02em; margin: 0; color: var(--t-pap); }
.hero__loc { font-family: var(--f-mono); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: var(--t-pap-mute); margin-top: 16px; }
.hero__empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: repeating-linear-gradient(135deg, #16262d 0 2px, transparent 2px 11px), linear-gradient(160deg, #16272e, #0e1a1f); }
.hero__empty span { font-family: var(--f-mono); font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: #5e767c; }

/* ============================================================ PRICE ============================================================ */
.price { background: var(--paper); padding-top: 0; padding-bottom: clamp(40px,7cqi,84px); }
.price__card { position: relative; z-index: 3; margin-top: clamp(-58px, -7cqi, -88px); background: var(--white); border: 1px solid var(--line-2); border-radius: var(--r-lg); box-shadow: var(--lift-2); padding: clamp(28px,5.5cqi,56px); }
.price__accentbar { position: absolute; left: 0; top: 22px; bottom: 22px; width: 4px; border-radius: 0 4px 4px 0; background: linear-gradient(var(--teal-700), var(--teal-500)); }
.price__meta { display: flex; justify-content: space-between; align-items: baseline; gap: 16px 28px; flex-wrap: wrap; }
.price__label { font-family: var(--f-mono); font-size: 11.5px; letter-spacing: .24em; text-transform: uppercase; color: var(--teal-700); font-weight: 500; white-space: nowrap; }
.price__sub { font-size: 15.5px; color: var(--t-soft); margin: 0; max-width: 32ch; }
.price__sub b { color: var(--teal-900); font-weight: 600; }
.price__single { font-family: var(--f-display); font-weight: 400; font-size: clamp(60px, 18cqi, 144px); line-height: .9; letter-spacing: -.03em; color: var(--teal-900); margin: 20px 0 0; font-variant-numeric: lining-nums tabular-nums; }
.price__single .cur { font-size: .5em; vertical-align: .34em; color: var(--teal-500); }
.price__range { margin-top: 20px; }
.price__rangerow { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
.price__leg { display: flex; flex-direction: column; gap: 4px; }
.price__leg .cap { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: .2em; text-transform: uppercase; color: var(--teal-700); }
.price__leg .val { font-family: var(--f-display); font-weight: 400; font-size: clamp(46px, 13cqi, 104px); line-height: .88; letter-spacing: -.03em; color: var(--teal-900); font-variant-numeric: lining-nums tabular-nums; }
.price__leg .val .cur { font-size: .48em; vertical-align: .36em; color: var(--teal-500); }
.price__dash { display: none; font-family: var(--f-display); color: var(--teal-500); font-size: clamp(28px,8cqi,60px); line-height: 1; padding-bottom: .12em; }
.price__bar { margin-top: 22px; height: 6px; border-radius: 99px; background: var(--teal-100); position: relative; overflow: hidden; }
@keyframes barGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
.price__bar i { position: absolute; inset: 0; border-radius: 99px; background: linear-gradient(90deg, var(--teal-500), var(--teal-700)); transform-origin: left; transform: scaleX(1); animation: barGrow 1.1s var(--ease) .25s both; }

/* ============================================================ 01 NOTE ============================================================ */
.note { background: var(--offwhite); }
.note__grid { display: grid; gap: clamp(28px,5cqi,56px); align-items: center; }
.note__copy .lede { margin-top: 20px; max-width: 26ch; }
.note__copy .body-lg { margin-top: 16px; max-width: 42ch; }
.video { position: relative; aspect-ratio: 4 / 5; border-radius: var(--r-lg); overflow: hidden; background: linear-gradient(165deg, var(--teal-200), var(--mist)); border: 1px solid var(--line); box-shadow: var(--lift-1); }
.video::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(135deg, rgba(5,56,69,.04) 0 2px, transparent 2px 12px); }
.video__play { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 66px; height: 66px; border-radius: 50%; background: var(--white); display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(5,56,69,.25); }
.video__play::after { content: ""; border-left: 16px solid var(--teal-700); border-top: 10px solid transparent; border-bottom: 10px solid transparent; margin-left: 4px; }
.video__cap { position: absolute; left: 20px; bottom: 18px; font-family: var(--f-display); font-style: italic; font-size: 15px; color: var(--teal-900); }

/* ============================================================ 02 WHY PRICE — comps (slim mobile thumb) ============================================================ */
.whyprice { background: var(--paper); }
.why__lead { display: grid; gap: clamp(20px,4cqi,40px); align-items: end; margin-top: clamp(26px,4cqi,40px); }
.why__numblock { display: flex; gap: 18px; align-items: flex-start; }
.why__num { font-family: var(--f-display); font-weight: 400; font-size: clamp(58px, 13cqi, 108px); line-height: .8; color: var(--teal-900); letter-spacing: -.03em; }
.why__numtext { font-size: clamp(16.5px,2.2cqi,19px); line-height: 1.32; color: var(--t-ink); max-width: 16ch; align-self: center; }
.why__agentnote { font-family: var(--f-display); font-style: italic; font-size: clamp(16px,2.2cqi,19px); color: var(--t-soft); line-height: 1.5; max-width: 44ch; }

.comps { margin-top: clamp(30px,5cqi,52px); display: grid; gap: 12px; }
.comp-card { background: var(--white); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--lift-1); overflow: hidden; display: flex; flex-direction: row; align-items: stretch; transition: transform .25s var(--ease), box-shadow .25s var(--ease); }
.comp-card:hover { transform: translateY(-3px); box-shadow: var(--lift-2); }
.comp-card__photo { position: relative; flex: none; width: 116px; align-self: stretch; min-height: 96px; background: var(--mist); }
.comp-card__photo image-slot { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
.comp-card__body { flex: 1; min-width: 0; padding: clamp(15px,2.4cqi,18px) clamp(16px,2.6cqi,20px); display: flex; align-items: center; justify-content: space-between; gap: 14px; }
.comp-card__info { min-width: 0; }
.comp-card__idx { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: .14em; color: var(--t-mute); display: block; margin-bottom: 5px; }
.comp-card__addr { font-family: var(--f-display); font-size: clamp(18px,2.6cqi,22px); color: var(--t-ink); line-height: 1.1; }
.comp-card__meta { font-family: var(--f-mono); font-size: 10px; letter-spacing: .07em; color: var(--t-mute); text-transform: uppercase; margin-top: 6px; }
.comp-card__price { text-align: right; flex: none; }
.comp-card__price b { font-family: var(--f-display); font-size: clamp(18px,2.6cqi,23px); color: var(--t-ink); font-weight: 400; display: block; font-variant-numeric: lining-nums tabular-nums; }
.comp-card__price span { font-family: var(--f-mono); font-size: 9.5px; letter-spacing: .18em; color: var(--t-mute); text-transform: uppercase; }
.comp__src { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: .18em; text-transform: uppercase; color: var(--t-mute); margin-top: 20px; }

/* ============================================================ WHY WORK WITH US — cream cards ============================================================ */
.reasons { background: var(--offwhite); }
.rcards { margin-top: clamp(28px,5cqi,48px); display: grid; gap: 14px; }
.rcard { background: var(--white); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--lift-1); padding: clamp(22px,3cqi,30px); transition: transform .25s var(--ease), box-shadow .25s var(--ease); }
.rcard:hover { transform: translateY(-3px); box-shadow: var(--lift-2); }
.rcard__idx { font-family: var(--f-mono); font-size: 12px; letter-spacing: .12em; color: var(--teal-700); }
.rcard__title { font-family: var(--f-display); font-size: clamp(21px,2.8cqi,26px); color: var(--t-ink); margin-top: 16px; line-height: 1.12; }
.rcard__body { font-size: 16px; color: var(--t-body); margin-top: 10px; line-height: 1.55; max-width: 46ch; }

/* ============================================================ BY THE NUMBERS — dark band, us vs market ============================================================ */
.bynum { background: var(--ink); color: var(--t-pap); }
.cmp { margin-top: clamp(22px,3.5cqi,34px); }
.cmp__label { font-family: var(--f-mono); font-size: 11.5px; letter-spacing: .22em; text-transform: uppercase; color: var(--t-pap-soft); }
.cmp__row { display: flex; align-items: flex-end; gap: clamp(20px,5cqi,56px); margin-top: 22px; flex-wrap: wrap; }
.card-mark { width: 48px; height: 48px; border-radius: 13px; background: var(--teal-100); border: 1px solid color-mix(in oklab, var(--teal-700) 18%, transparent); display: flex; align-items: center; justify-content: center; color: var(--teal-700); flex: none; }
.card-mark svg { width: 24px; height: 24px; display: block; }

.cmp__col { display: flex; flex-direction: column; gap: 16px; }
.cmp__k { font-family: var(--f-mono); font-size: 10.5px; letter-spacing: .16em; text-transform: uppercase; }
.cmp__col--you .cmp__k { color: var(--teal-500); }
.cmp__col--mkt .cmp__k { color: var(--t-pap-mute); }
.cmp__v { font-family: var(--f-display); line-height: .92; letter-spacing: -.02em; display: flex; align-items: baseline; }
.cmp__v i { font-style: normal; font-size: .4em; margin-left: .04em; }
.cmp__col--you .cmp__v { font-size: clamp(64px,15cqi,128px); color: var(--t-pap); }
.cmp__col--you .cmp__v i { color: var(--t-pap-soft); }
.cmp__col--you .spark { color: var(--mint); }
.cmp__col--mkt .cmp__v { font-size: clamp(40px,9cqi,80px); color: var(--t-pap-mute); }
.cmp__col--mkt .cmp__v i { color: var(--t-pap-mute); }
.cmp__vs { font-family: var(--f-display); font-style: italic; color: var(--t-pap-mute); font-size: clamp(18px,3cqi,28px); padding-bottom: .5em; }
.bynum__track { margin-top: clamp(30px,5cqi,46px); height: 12px; border-radius: 99px; background: rgba(255,255,255,.08); position: relative; }
@keyframes fillGrow { from { transform: scaleX(0); } to { transform: scaleX(var(--fill, .983)); } }
.bynum__fill { position: absolute; inset: 0; border-radius: 99px; background: linear-gradient(90deg, var(--teal-500), var(--mint)); transform-origin: left; transform: scaleX(var(--fill, .983)); animation: fillGrow 1.3s var(--ease) .3s both; }
.bynum__mktmark { position: absolute; top: -7px; bottom: -7px; width: 2px; background: var(--t-pap-soft); }
.bynum__mktmark span { position: absolute; top: -22px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-family: var(--f-mono); font-size: 9.5px; letter-spacing: .1em; color: var(--t-pap-mute); text-transform: uppercase; }

/* ============================================================ HOW WE MARKET — warm-tint FEATURE moment (prominent icons, bolder) ============================================================ */
.mkt { background: var(--sand); }
.mcards { margin-top: clamp(28px,5cqi,48px); display: grid; gap: 14px; }
.mcard { background: var(--white); border: 1px solid var(--line); border-radius: var(--r-lg); box-shadow: var(--lift-1); padding: clamp(26px,3.6cqi,40px); transition: transform .25s var(--ease), box-shadow .25s var(--ease); }
.mcard:hover { transform: translateY(-3px); box-shadow: var(--lift-2); }
.mcard .card-mark { width: 58px; height: 58px; border-radius: 17px; }
.mcard .card-mark svg { width: 30px; height: 30px; }
.mcard__title { font-family: var(--f-display); font-size: clamp(22px,3.1cqi,30px); color: var(--t-ink); margin-top: 22px; line-height: 1.08; }
.mcard__body { font-size: 16.5px; color: var(--t-body); margin-top: 12px; line-height: 1.55; max-width: 42ch; }

/* ============================================================ HOW WE WORK — stepper / mobile timeline ============================================================ */
.work { background: var(--mist); }
.flow { margin-top: clamp(28px,5cqi,48px); display: grid; gap: 14px; position: relative; }
.flow::before { content: ""; position: absolute; left: 33px; top: 26px; bottom: 26px; width: 2px; background: var(--line-2); z-index: 0; }
.fstep { position: relative; z-index: 1; background: var(--white); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--lift-1); padding: clamp(18px,2.6cqi,22px) clamp(18px,2.6cqi,22px) clamp(18px,2.6cqi,22px) 66px; transition: transform .25s var(--ease), box-shadow .25s var(--ease); }
.fstep:hover { transform: translateY(-2px); box-shadow: var(--lift-2); }
.fstep__badge { position: absolute; left: 16px; top: clamp(18px,2.6cqi,22px); width: 34px; height: 34px; border-radius: 50%; background: var(--teal-700); color: #eafcff; font-family: var(--f-mono); font-size: 13px; display: flex; align-items: center; justify-content: center; }
.fstep__title { font-family: var(--f-display); font-size: clamp(19px,2.6cqi,23px); color: var(--t-ink); line-height: 1.12; }
.fstep__body { font-size: 15.5px; color: var(--t-body); margin-top: 6px; line-height: 1.5; }

/* ============================================================ REVIEWS — dark band, pull-quote + confidence ============================================================ */
.reviews { background: var(--ink); color: var(--t-pap); }
.reviews__layout { margin-top: clamp(24px,4cqi,40px); display: grid; gap: clamp(28px,5cqi,48px); align-items: center; }
.stars { color: var(--teal-500); letter-spacing: 4px; font-size: 17px; }
.stars.sm { font-size: 13px; letter-spacing: 2px; }
.review__q { font-family: var(--f-display); font-size: clamp(24px,3.8cqi,38px); line-height: 1.3; color: var(--t-pap); letter-spacing: -.012em; margin: 16px 0 0; max-width: 22ch; text-wrap: pretty; }
.review__q .mark { color: var(--teal-500); }

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script>
// @ds-adherence-ignore -- omelette starter scaffold (raw elements/hex/px by design)
/* BEGIN USAGE */
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */
/* END USAGE */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +

      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);

      });
      // naturalWidth/Height aren't known until load — re-apply so the cover
      // baseline is computed from real dimensions, not the 100%×100% fallback.

      // stay static.
      this.addEventListener('dblclick', (e) => {

        else this._enterReframe();
      });
      // Pan + resize both originate on the spill layer. A handle pointerdown

        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');
        let move;
        if (corner) {
          // Resize about the OPPOSITE corner. Viewport-px throughout (rect
          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;

          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };
        } else {
          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;

            this._applyView();
          };

        const k = next / prev;

        this._view.x = cx * (1 - k) + this._view.x * k;
        this._view.y = cy * (1 - k) + this._view.y * k;

    connectedCallback() {
      // Warn once per page — an id-less slot works for the session but
      // cannot persist, and two id-less slots would share nothing.

      this.addEventListener('dragover', this);

      // a host resize (responsive grid, pane divider) would stretch the
      // image until the next _render. Re-render on size change: _render()

      // cycle round-trips instead of ratcheting x/y toward the narrower
      // frame's clamp range.
      this._ro = new ResizeObserver(() => this._render());

    disconnectedCallback() {

      this.removeEventListener('dragover', this);

    }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();

      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {

      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {

        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function AreaSales() {
  const a = D.areaSales;
  if (!a.present) return null;
  const pts = a.chart.points.filter((p) => p.v != null);
  const W = 640, H = 250, padL = 48, padR = 16, padT = 28, padB = 34;
  const rec = 687;
  const ys = pts.map((p) => p.v);
  const min = Math.min(...ys, rec) - 8, max = Math.max(...ys, rec) + 8;
  const x = (i) => padL + (i / (pts.length - 1)) * (W - padL - padR);
  const y = (v) => padT + (1 - (v - min) / (max - min)) * (H - padT - padB);
  const line = pts.map((p, i) => `${x(i).toFixed(1)},${y(p.v).toFixed(1)}`).join(" ");
  const areaPath = `M ${x(0)},${y(pts[0].v)} ` + pts.map((p, i) => `L ${x(i)},${y(p.v)}`).join(" ") +

  const ticks = [685, 670, 655];   // clean value ticks within domain

  return (

        {a.stats.map((s, i) => (
          <div className="stat" key={i} data-reveal style={{ transitionDelay: (i * 70) + "ms" }}>
            <div className="stat__val">{s.value}</div>
            <div className="stat__label">{s.label}</div>
            <div className="stat__sub">{s.sub}</div>
          </div>
        ))}
      </div>
      <div className="chart" data-reveal>
        <div className="chart__head">
          <div className="chart__cap">
            <span className="k">{a.chart.recommendedLabel}</span>
            <span className="v pill">{a.chart.recommendedValue}</span>
          </div>
          <div className="chart__cap r">
            <span className="k">{a.chart.currentLabel}</span>
            <span className="v">{a.chart.currentValue}</span>
          </div>
        </div>
        <div className="chart__plot">
          <svg viewBox={`0 0 ${W} ${H}`} role="img" aria-label="Median sale price, last 6 months">
            {ticks.map((tv, i) => (
              <g key={"t" + i}>
                <line className="gridline" x1={padL} x2={W - padR} y1={y(tv)} y2={y(tv)} />
                <text className="ylabel" x={padL - 10} y={y(tv) + 3} textAnchor="end">${tv}k</text>
              </g>
            ))}
            <line className="dashline" x1={padL} x2={W - padR} y1={y(rec)} y2={y(rec)} />
            <path className="area-fill" d={areaPath} />
            <line className="dropline" x1={x(lastI)} x2={x(lastI)} y1={y(pts[lastI].v)} y2={H - padB} />
            <polyline className="line" points={line} pathLength="200" style={{ "--len": 200 }} />
            {pts.map((p, i) => (
              <g key={i}>
                {i === lastI && <circle className="halo" cx={x(i)} cy={y(p.v)} r="10" />}
                <circle className={"dot" + (i === lastI ? " cur" : "")} cx={x(i)} cy={y(p.v)} r={i === lastI ? 6 : 3.6} />
                <text className="xlabel" x={x(i)} y={H - 9} textAnchor="middle">{p.month}</text>
              </g>
            ))}
          </svg>
        </div>
      </div>
    </section>
  );
}

/* ---------- 06 · YOUR AGENT (footer) ---------- */
function AgentFooter({ heroPhoto }) {
  const a = D.agent;
  return (
    <section className="section agent" data-screen-label="Your agent">
      <div className="agent__top">
        <div data-reveal>
          <div className="eyebrow on-dark"><span className="num">06</span> · Your Agent</div>
          <h2 className="agent__name">{a.name}.</h2>
          <div className="agent__tag">{a.tagline}</div>
        </div>
        <div data-reveal>
          <div className="agent__card">
            <div className="agent__avatar">
              {heroPhoto
                ? <image-slot id="agent-headshot" shape="circle" placeholder="Headshot"></image-slot>
                : a.monogram}
            </div>
            <div className="agent__who">
              <div className="n">{a.name}</div>
              <div className="r">{a.role}</div>
            </div>
          </div>
        </div>
      </div>

      <div className="agent__bio" data-reveal>{a.bio}</div>

      <div className="agent__meta" data-reveal>
        <div className="agent__field"><div className="k">Phone</div><div className="v">{a.phone}</div></div>
        <div className="agent__field"><div className="k">Email</div><div className="v">{a.email}</div></div>
        <div className="agent__field"><div className="k">License</div><div className="v">{a.license}</div></div>
        <div className="agent__field"><div className="k">Years Here</div><div className="v">{a.yearsHere}</div></div>
      </div>

      <div className="agent__cta" data-reveal>
        <a className="btn btn--primary" href="#" onClick={(e) => e.preventDefault()}>
          <span className="btn__lbl">Schedule a listing call</span> <span className="ar">→</span>
        </a>
        <a className="btn btn--ghost" href="#" onClick={(e) => e.preventDefault()}>
          <span className="btn__lbl">Call Aaron directly</span> <span className="ar">☏</span>
        </a>
      </div>
      <div className="agent__note">No pressure, reach out anytime.</div>

      <div className="agent__foot">
        <div className="agent__lower">
          <div className="agent__brand">Studio <em>SEP</em></div>
          <div className="agent__disc">{a.disclaimer}</div>
        </div>
      </div>
    </section>
  );
}

Object.assign(window, {
  Hero, Price, Note, WhyPrice, Reasons, ByNumbers,
  Marketing, HowWeWork, Reviews, AreaSales, AgentFooter,
});

</script>
<script type="text/babel" data-presets="react">
// app.jsx — composes the seller page, manages viewport + state Tweaks,
// and drives the motion layer (scroll-reveal + earned draws).

const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "priceState": "single",
  "heroPhoto": "photo",
  "density": "full",
  "compsMode": "photos",
  "reviewSource": "both",
  "accent": "#06647D",
  "typePair": "newsreader"
}/*EDITMODE-END*/;

const SPARSE_HIDDEN = new Set(["whyPrice", "reasons", "byNumbers", "marketing", "howWeWork", "areaSales"]);

function SellerPage({ t }) {
  const sparse = t.density === "sparse";
  const show = (key) => !(sparse && SPARSE_HIDDEN.has(key));
  return (
    <div className={"sep pair-" + t.typePair} style={{ "--teal-700": t.accent }}>
      <Hero heroPhoto={t.heroPhoto === "photo"} />
      <Price priceState={t.priceState} />
      {D.note.present && <Note />}
      {show("whyPrice") && <WhyPrice compsMode={t.compsMode} />}
      {show("reasons") && <Reasons />}
      {show("byNumbers") && <ByNumbers />}
      {show("marketing") && <Marketing />}
      {show("howWeWork") && <HowWeWork />}
      <Reviews reviewSource={t.reviewSource} />
      {show("areaSales") && <AreaSales />}
      <AgentFooter heroPhoto={t.heroPhoto === "photo"} />
    </div>
  );
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [view, setView] = useState(() => localStorage.getItem("sep_view") || "mobile");
  const setVp = (v) => { setView(v); localStorage.setItem("sep_view", v); };

  const key = [t.priceState, t.heroPhoto, t.density, t.compsMode, t.reviewSource, t.typePair, view].join("|");

  return (
    <div className="stage">
      <div className="topbar">
        <span className="brandtag">Studio SEP · Seller Page</span>
        <div className="seg">
          <button className={view === "mobile" ? "on" : ""} onClick={() => setVp("mobile")}>Mobile</button>
          <button className={view === "desktop" ? "on" : ""} onClick={() => setVp("desktop")}>Desktop</button>
        </div>
        <span className="hint">Tweaks ▸ states &amp; palette</span>
      </div>

      <div className="frame-wrap">
        <div className={"frame " + view}>
          <SellerPage key={key} t={t} />
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Page states" />
        <TweakRadio label="Price" value={t.priceState}
          options={["single", "range"]}
          onChange={(v) => setTweak("priceState", v)} />
        <TweakRadio label="Comp photos" value={t.compsMode}
          options={["photos", "text"]}
          onChange={(v) => setTweak("compsMode", v)} />
        <TweakRadio label="Review source" value={t.reviewSource}
          options={["both", "zillow", "none"]}
          onChange={(v) => setTweak("reviewSource", v)} />
        <TweakRadio label="Cover photo" value={t.heroPhoto}
          options={["photo", "empty"]}
          onChange={(v) => setTweak("heroPhoto", v)} />
        <TweakRadio label="Content" value={t.density}
          options={["full", "sparse"]}
          onChange={(v) => setTweak("density", v)} />

        <TweakSection label="Palette" />
        <TweakColor label="Signature teal" value={t.accent}
          options={["#06647D", "#0A5A8A", "#14706E", "#27414E"]}
          onChange={(v) => setTweak("accent", v)} />

        <TweakSection label="Type pairing" />
        <TweakRadio label="Display" value={t.typePair}
          options={["newsreader", "spectral"]}
          onChange={(v) => setTweak("typePair", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>

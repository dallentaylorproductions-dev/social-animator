<style>
  /* ============================================
     STUDIO SEP — Seller Presentation (Consumer)
     Warm paper register · mobile-first · editorial
     ============================================ */
  :root {
    --paper: #F1EBE0;
    --paper-deep: #E8E0D2;
    --paper-raise: #FBF7EE;
    --paper-card: #FCF9F2;
    --paper-line: #E0D6C5;
    --paper-line-soft: #EAE1D0;
    --ink: #1A1612;
    --ink-2: #2A241F;
    --ink-muted: #6E665B;
    --ink-faint: #A29888;
    --mint: #4EF2D9;
    --mint-deep: #1F8F7C;
    --gold: #C9A86A;
    --gold-warm: #B8965A;
    --brick: #C26A4E;
    --brick-deep: #A85439;
    --rose: #D29A9A;
    --pos: #1D9E75;
    --pos-bright: #6EE7A8;
    --chart-blue: #3F6C8E;
    --chart-blue-deep: #2C5474;
    --display: "Instrument Serif", "Iowan Old Style", Georgia, serif;
    --ui: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --mono: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --r-md: 10px; --r-lg: 14px; --r-xl: 20px; --r-2xl: 28px; --r-pill: 999px;
    --ease: cubic-bezier(.2,.7,.1,1);
    --shadow-card: 0 1px 0 rgba(255,255,255,.7) inset, 0 18px 40px -26px rgba(40,28,16,.18);
    --shadow-paper: 0 1px 0 rgba(255,255,255,.6) inset, 0 32px 80px -40px rgba(40,28,16,.22);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--ui);
    background: var(--paper-deep);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
    min-height: 100vh;
  }

  /* ===== Outer stage (so the phone-width page feels presented) ===== */
  .stage {
    min-height: 100vh;
    padding: 56px 24px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    background:
      radial-gradient(60% 40% at 50% 0%, #F1E9DA 0%, transparent 60%),
      var(--paper-deep);
  }
  .stage-head {
    width: 100%; max-width: 460px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--ink-faint); letter-spacing: .14em; text-transform: uppercase;
  }
  .stage-head .brand {
    display: flex; align-items: center; gap: 10px;
    color: var(--ink-muted);
  }
  .stage-head .brand .glyph {
    width: 18px; height: 18px;
    border-radius: 5px;
    background: var(--mint);
    color: #0A2A24;
    display: grid; place-items: center;
    font-family: var(--display); font-size: 13px; font-style: italic;
    letter-spacing: -.02em; line-height: 1;
  }
  .stage-head .brand .wordmark {
    font-family: var(--display); font-size: 15px;
    color: var(--ink); letter-spacing: -.01em;
    text-transform: none;
  }
  .stage-head .brand .wordmark em { font-style: italic; color: var(--mint-deep); }
  .stage-head .url { text-transform: lowercase; letter-spacing: .04em; }

  /* ===== The page itself ===== */
  .page {
    width: 100%;
    max-width: 430px;
    background: var(--paper);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: var(--shadow-paper);
    position: relative;
    color: var(--ink);
  }

  /* ===== Top app-bar inside the page ===== */
  .appbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 18px 22px 14px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 5;
    background: linear-gradient(180deg, rgba(0,0,0,.32) 0%, rgba(0,0,0,0) 100%);
    color: #fbf6ec;
  }
  .appbar .prepared {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    opacity: .9;
  }
  .appbar .share {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,.14);
    backdrop-filter: blur(8px);
    display: grid; place-items: center;
    border: 1px solid rgba(255,255,255,.18);
  }
  .appbar .share svg {
    width: 14px; height: 14px;
    stroke: #fbf6ec; stroke-width: 1.5;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ===== Hero photo (clean band — no text over the image) ===== */
  .hero {
    position: relative;
    height: 480px;
    background: #1A1612;
    color: #fbf6ec;
    overflow: hidden;
    margin-bottom: 0;
  }
  /* 1px inset frame — subtle craft detail */
  .hero::after {
    content: "";
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(255,255,255,.10);
    pointer-events: none;
    z-index: 4;
  }
  .hero-photo {
    position: absolute;
    inset: -2%;
    background:
      url("9852360d-e764-4f4d-b47d-aed100095ba1") center 38% / cover no-repeat,
      #c8b69a;
    z-index: 0;
    animation: kenburns 22s cubic-bezier(.4,.0,.6,1) forwards;
    transform-origin: 50% 45%;
  }
  .hero .appbar { position: relative; z-index: 2; }

  /* ===== Caption card — dark ink, overlaps bottom of photo ===== */
  .caption-wrap {
    position: relative;
    margin: -44px 18px 0; /* overlap the photo by 44px */
    z-index: 3;
  }
  .caption-card {
    background: #16110D;
    color: #F4EFE4;
    border-radius: 14px;
    padding: 22px 26px 26px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 22px 50px -28px rgba(20,12,4,.55),
      0 6px 18px -10px rgba(20,12,4,.35);
    border: 1px solid rgba(255,255,255,.04);
  }
  .caption-card .for {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--mint);
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .caption-card .for::before {
    content: "";
    width: 6px; height: 6px;
    background: var(--mint);
    border-radius: 50%;
  }
  .caption-card .kicker {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(244,239,228,.65);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .caption-card .kicker::before {
    content: "";
    width: 18px; height: 1px;
    background: currentColor;
    opacity: .55;
  }
  .caption-card .addr {
    font-family: var(--display);
    font-weight: 400;
    font-size: 40px;
    line-height: 1.02;
    letter-spacing: -.025em;
    margin: 0;
    color: #F4EFE4;
    /* Avoid the street number breaking from "Kenilworth" */
    text-wrap: balance;
  }
  .caption-card .addr em {
    font-style: italic;
    display: block;
    margin-top: 2px;
  }
  .caption-card .city {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid rgba(244,239,228,.12);
    color: rgba(244,239,228,.55);
  }

  /* ===== Price panel directly below caption card ===== */
  /* HERO PRICE TREATMENT — oversized serif w/ brick side accent */
  .price-panel {
    padding: 52px 28px 40px;
    margin-top: 0;
    background: var(--paper-raise);
    border-bottom: 1px solid var(--paper-line);
    position: relative;
  }
  .price-panel::before {
    /* brick vertical accent bar */
    content: "";
    position: absolute;
    left: 28px; top: 52px;
    width: 3px; height: calc(100% - 92px);
    background: var(--brick);
  }
  .price-panel .lbl {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--brick);
    margin-bottom: 18px;
    padding-left: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .price-panel .lbl::before { display: none; }
  .price-panel .price {
    border-bottom: 1px solid var(--paper-line-soft);
    padding: 0 0 26px 18px;
  }
  .price-panel .rationale {
    padding-left: 18px;
  }

  /* ===== Personal note from agent (warm paper, between caption + price) ===== */
  .personal-note {
    margin: 18px 0 0;
    padding: 36px 28px 30px;
    background: var(--paper);
    text-align: left;
    position: relative;
  }
  .personal-note .from {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .personal-note .from::before {
    content: "";
    width: 18px; height: 1px;
    background: currentColor;
    opacity: .55;
  }
  .personal-note .pn-body {
    font-family: var(--display);
    font-style: italic;
    font-size: 24px;
    line-height: 1.28;
    letter-spacing: -.015em;
    color: var(--ink);
    margin: 0;
    max-width: 30ch;
  }
  .personal-note .sig {
    margin-top: 18px;
    font-family: var(--display);
    font-style: italic;
    font-size: 17px;
    letter-spacing: -.005em;
    color: var(--brick);
  }
  .personal-note .sig::before {
    content: "";
    display: inline-block;
    width: 22px; height: 1px;
    background: var(--brick);
    vertical-align: middle;
    margin-right: 10px;
    opacity: .8;
  }

  /* ===== Track record block — DARK CHAPTER ===== */
  .track {
    padding: 64px 28px 60px;
    border-bottom: 1px solid rgba(0,0,0,.4);
    background:
      radial-gradient(120% 60% at 0% 0%, rgba(201,168,106,.06) 0%, transparent 60%),
      linear-gradient(180deg, #1A1612 0%, #14110D 100%);
    color: #F4EFE4;
    position: relative;
  }
  .track .sec-label { color: rgba(244,239,228,.55); }
  .track .sec-label .num { color: var(--gold); }
  .track .sec-label .num::before { background: var(--mint); }
  .track .sec-label .lbl { background: rgba(244,239,228,.16); }
  .track .sec-label .name { color: rgba(244,239,228,.55); }
  .track .sec-title { color: #F4EFE4; max-width: 14ch; }
  .track .sec-title em { color: var(--gold); font-style: italic; }
  .track .sec-body { color: rgba(244,239,228,.72); }

  /* Structured stat ROWS on the dark chapter — horizontal layout
     for clean baselines: [BIG NUMBER]  |  LABEL / descriptor */
  .track-figures {
    margin-top: 40px;
    border-top: 1px solid rgba(244,239,228,.14);
    border-bottom: 1px solid rgba(244,239,228,.14);
  }
  .tf {
    padding: 28px 0 26px;
    border-bottom: 1px solid rgba(244,239,228,.10);
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 28px;
    align-items: center;
    background: transparent;
  }
  .tf:last-child { border-bottom: 0; }
  .tf .v {
    font-family: var(--display);
    font-size: 64px;
    line-height: .9;
    letter-spacing: -.035em;
    color: var(--gold);
    display: flex;
    align-items: baseline;
  }
  .tf .v em {
    font-style: italic;
    font-size: 30px;
    color: rgba(201,168,106,.65);
    letter-spacing: -.02em;
    margin-left: 2px;
  }
  .tf .l {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: rgba(244,239,228,.5);
    line-height: 1.4;
  }
  .tf .l strong {
    display: block;
    color: #F4EFE4;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: .14em;
    font-size: 11px;
  }
  .tf .l small {
    display: block;
    font-family: var(--ui);
    font-size: 13px;
    color: rgba(244,239,228,.62);
    letter-spacing: 0;
    text-transform: none;
    margin-top: 0;
    line-height: 1.45;
    font-weight: 400;
    max-width: 30ch;
  }

  /* Past-seller testimonial on the dark chapter */
  .testimonial {
    margin-top: 40px;
    padding-top: 4px;
    display: grid;
    grid-template-columns: 22px 1fr;
    gap: 18px;
    align-items: start;
  }
  .testimonial .rule {
    width: 1px;
    background: var(--brick);
    align-self: stretch;
    margin-top: 6px;
    opacity: .9;
  }
  .testimonial .ts-body {
    font-family: var(--display);
    font-style: italic;
    font-size: 22px;
    line-height: 1.32;
    letter-spacing: -.01em;
    color: #F4EFE4;
    margin: 0 0 16px;
    max-width: 36ch;
  }
  .testimonial .att {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: rgba(244,239,228,.5);
    display: flex; align-items: center; gap: 10px;
  }
  .testimonial .att .nm { color: rgba(244,239,228,.85); font-weight: 500; }

  /* ===== CTA reassurance microcopy ===== */
  .cta-reassure {
    margin: 14px 22px 0;
    font-family: var(--ui);
    font-size: 12.5px;
    line-height: 1.55;
    color: rgba(244,239,228,.55);
    font-style: italic;
    letter-spacing: -.005em;
    text-align: center;
  }

  /* ============================================
     VIDEO BLOCK (optional — hides if no video)
     ============================================ */
  .video-block {
    padding: 56px 28px;
    background: var(--paper-card);
    border-bottom: 1px solid var(--paper-line);
  }
  .video-block .sec-title { max-width: 14ch; }
  .video-poster {
    margin-top: 28px;
    position: relative;
    aspect-ratio: 4 / 5;
    border-radius: var(--r-md);
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(20,14,8,.55) 100%),
      url("7a6f56bc-31d1-48cf-844e-b9d6407b6783") center 25% / cover no-repeat,
      #5e544a;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: transform var(--ease) 220ms;
  }
  /* subtle inset frame, mirrors hero photo */
  .video-poster::after {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(255,255,255,.18);
    pointer-events: none;
    border-radius: 4px;
  }
  .video-poster:hover { transform: translateY(-2px); }
  .video-poster .play {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(244,239,228,.92);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.4);
    display: grid; place-items: center;
    transition: background var(--ease) 140ms, transform var(--ease) 140ms;
  }
  .video-poster:hover .play { background: #FFFFFF; transform: translate(-50%, -50%) scale(1.04); }
  .video-poster .play::before {
    content: "";
    width: 0; height: 0;
    border-left: 14px solid var(--ink);
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    margin-left: 4px;
  }
  .video-poster .meta {
    position: absolute;
    left: 22px; bottom: 22px; right: 22px;
    color: #fbf6ec;
    z-index: 2;
  }
  .video-poster .meta .ttl {
    font-family: var(--display);
    font-size: 24px;
    line-height: 1.18;
    letter-spacing: -.015em;
    text-shadow: 0 1px 1px rgba(0,0,0,.55), 0 2px 18px rgba(0,0,0,.45);
    max-width: 22ch;
  }
  .video-poster .meta .ttl em { font-style: italic; }
  .video-poster .meta .runtime {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    opacity: .88;
    margin-top: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .video-poster .meta .runtime::before {
    content: "";
    width: 18px; height: 1px;
    background: currentColor;
    opacity: .55;
  }

  /* ============================================
     REVIEWS BLOCK (optional — hides if no reviews)
     ============================================ */
  .reviews {
    padding: 60px 28px 56px;
    background: var(--paper-raise);
    border-bottom: 1px solid var(--paper-line);
  }
  .reviews .sec-title { max-width: 16ch; }
  .reviews-list {
    margin-top: 32px;
    display: flex; flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--paper-line-soft);
  }
  .review {
    padding: 26px 0 24px;
    border-bottom: 1px solid var(--paper-line-soft);
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 18px;
    align-items: start;
  }
  .review .qm {
    font-family: var(--display);
    font-style: italic;
    font-size: 32px;
    line-height: .5;
    color: var(--rose);
    padding-top: 18px;
    width: 18px;
    text-align: center;
  }
  .review .rv-body {
    font-family: var(--display);
    font-size: 19px;
    line-height: 1.36;
    letter-spacing: -.005em;
    color: var(--ink);
    margin: 0 0 14px;
    max-width: 36ch;
  }
  .review .rv-body em { font-style: italic; }
  .review .att {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .review .att .nm { color: var(--ink-muted); font-weight: 500; }
  .reviews-outlink {
    margin-top: 24px;
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--ui);
    font-size: 13px;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--brick);
    padding-bottom: 2px;
    letter-spacing: -.005em;
    transition: gap var(--ease) 140ms;
  }
  .reviews-outlink:hover { gap: 14px; }
  .reviews-outlink::after {
    content: "→";
    color: var(--brick);
    font-size: 14px;
  }

  /* ============================================
     Closing mark (signature mint dot at the end)
     ============================================ */
  .end-mark {
    text-align: center;
    padding: 36px 28px 18px;
    background: var(--ink);
  }
  .end-mark .dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--mint);
    border-radius: 50%;
    margin: 0 6px;
    vertical-align: middle;
  }
  .end-mark .rule {
    display: inline-block;
    width: 18px; height: 1px;
    background: rgba(244,239,228,.18);
    vertical-align: middle;
  }
  .price {
    font-family: var(--display);
    font-weight: 400;
    font-size: 108px;
    line-height: .88;
    letter-spacing: -.04em;
    color: var(--ink);
    display: flex; align-items: flex-start;
  }
  .price .dollar {
    font-size: 42px;
    line-height: 1;
    margin: 10px 4px 0 0;
    color: var(--brick);
    letter-spacing: -.02em;
  }
  .rationale {
    margin-top: 22px;
    font-family: var(--display);
    font-style: italic;
    font-size: 22px;
    line-height: 1.28;
    letter-spacing: -.01em;
    color: var(--ink-2);
    max-width: 32ch;
  }
  .rationale::before {
    content: "";
    display: block;
    width: 28px; height: 1px;
    background: var(--brick);
    margin-bottom: 18px;
  }

  /* ===== Section scaffolding ===== */
  section.block {
    padding: 56px 28px;
    border-bottom: 1px solid var(--paper-line);
  }
  section.block:last-of-type { border-bottom: 0; }
  /* Background variants for editorial rhythm */
  section.block.paper { background: var(--paper); }
  section.block.raise { background: var(--paper-raise); }
  section.block.card { background: var(--paper-card); }

  /* ===== Refined numbered-section ornament =====
     [mint dot] [italic serif numeral] [hairline] [mono label]
     ============================================ */
  .sec-label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 14px;
  }
  .sec-label::after { display: none; }
  .sec-label .num {
    font-family: var(--display);
    font-style: italic;
    font-size: 17px;
    line-height: 1;
    letter-spacing: -.01em;
    color: var(--brick);
    text-transform: none;
    position: relative;
    padding-left: 14px;
    font-weight: 400;
  }
  .sec-label .num::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    width: 5px; height: 5px;
    background: var(--mint);
    border-radius: 50%;
    transform: translateY(-50%);
  }
  .sec-label .lbl {
    flex: 1;
    height: 1px;
    background: var(--paper-line);
    align-self: center;
  }
  .sec-label .name {
    color: var(--ink-muted);
    letter-spacing: .18em;
    text-transform: uppercase;
    font-family: var(--mono);
    font-size: 10.5px;
  }
  .sec-title {
    font-family: var(--display);
    font-weight: 400;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -.025em;
    margin: 0 0 22px;
    color: var(--ink);
    max-width: 12ch;
  }
  .sec-title em { font-style: italic; }
  .sec-body {
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink-2);
    margin: 0;
    max-width: 38ch;
  }
  .sec-body + .sec-body { margin-top: 14px; }

  /* Serif drop-cap (used on the first paragraph of “Why this price”) */
  .sec-body.drop-cap::first-letter {
    font-family: var(--display);
    font-size: 64px;
    line-height: .85;
    float: left;
    color: var(--brick);
    padding: 4px 12px 0 0;
    margin-top: 4px;
    font-style: italic;
    letter-spacing: -.02em;
  }

  /* ===== Why this price — comps ===== */
  .comps {
    margin-top: 36px;
    border-top: 1px solid var(--paper-line-soft);
  }
  .comp {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: baseline;
    gap: 16px;
    padding: 22px 0;
    border-bottom: 1px solid var(--paper-line-soft);
  }
  .comp .idx {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: .12em;
    line-height: 1.3;
    padding-top: 4px;
  }
  .comp .addr {
    font-family: var(--display);
    font-size: 21px;
    line-height: 1.18;
    letter-spacing: -.01em;
    color: var(--ink);
  }
  .comp .addr small {
    display: block;
    font-family: var(--ui);
    font-size: 11.5px;
    color: var(--ink-muted);
    letter-spacing: 0;
    margin-top: 3px;
    font-weight: 400;
  }
  .comp .sold {
    font-family: var(--display);
    font-size: 24px;
    color: var(--ink);
    letter-spacing: -.015em;
    text-align: right;
    line-height: 1;
  }
  .comp .sold small {
    display: block;
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 400;
  }
  .comps-note {
    margin-top: 18px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: .06em;
    line-height: 1.6;
  }

  /* graceful missing-comp state */
  .comp.missing {
    grid-template-columns: 28px 1fr;
    color: var(--ink-faint);
  }
  .comp.missing .addr {
    font-family: var(--ui);
    font-size: 13px;
    font-style: italic;
    color: var(--ink-faint);
    letter-spacing: 0;
  }

  /* ===== "What I'll do for you" — pitch points ===== */
  .pitch {
    background: var(--paper-card);
    margin: 0;
    padding: 56px 28px;
    border-bottom: 1px solid var(--paper-line);
    position: relative;
  }
  .pitch .sec-title { max-width: 14ch; }
  .pitches {
    margin-top: 32px;
    display: flex; flex-direction: column;
    gap: 28px;
  }
  .pp {
    display: grid;
    grid-template-columns: 40px 1fr;
    gap: 18px;
    align-items: baseline;
  }
  .pp .n {
    font-family: var(--display);
    font-style: italic;
    font-size: 30px;
    color: var(--brick);
    line-height: 1;
    letter-spacing: -.01em;
    padding-top: 2px;
  }
  .pp .t {
    font-family: var(--display);
    font-size: 22px;
    line-height: 1.22;
    letter-spacing: -.015em;
    color: var(--ink);
  }
  .pp .t small {
    display: block;
    font-family: var(--ui);
    font-size: 13.5px;
    color: var(--ink-muted);
    line-height: 1.5;
    margin-top: 6px;
    letter-spacing: 0;
  }

  /* ===== Recent area sales (kept as comment anchor) ===== */
  /* (styles consolidated into the new block above) */

  /* ===== area-head (kept) ===== */
  .area-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 28px;
  }
  .area-head .zip {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .chart-wrap {
    margin-top: 36px;
    padding: 44px 28px 40px;
    background: linear-gradient(180deg, #FCF9F2 0%, #FBF6EA 100%);
    border: 1px solid var(--paper-line);
    border-radius: 14px;
  }
  .chart-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 44px;
  }
  .chart-head .l {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    line-height: 1.4;
  }
  .chart-head .l strong {
    display: block;
    color: var(--ink-muted);
    font-weight: 500;
    margin-bottom: 4px;
    font-size: 10px;
    letter-spacing: .16em;
  }
  .chart-head .pct {
    font-family: var(--display);
    font-size: 28px;
    line-height: 1;
    letter-spacing: -.02em;
    color: var(--pos);
    display: flex; align-items: baseline; gap: 8px;
  }
  .chart-head .pct small {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .chart {
    width: 100%;
    display: block;
    overflow: visible;
    font-family: var(--mono);
  }
  .chart .gridline { stroke: var(--paper-line-soft); stroke-width: 1; }
  .chart .baseline { stroke: var(--ink); stroke-opacity: .22; stroke-width: 1; }
  .chart .y-label, .chart .x-label {
    font-size: 8.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    fill: var(--ink-faint);
  }
  /* Engaging area fill — gradient that intensifies toward the current month */
  .chart .area-fill {
    fill: url(#chartFill);
  }
  .chart .line-stroke {
    fill: none;
    stroke: var(--chart-blue);
    stroke-width: 2.6;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  /* Small subtle dots at each month */
  .chart .point {
    fill: var(--paper-card);
    stroke: var(--chart-blue);
    stroke-width: 1.4;
  }
  /* Current month — layered marker: a soft ring + filled dot */
  .chart .point-current-ring {
    fill: rgba(63, 108, 142, .22);
    stroke: none;
  }
  .chart .point-current {
    fill: var(--chart-blue);
    stroke: var(--paper-card);
    stroke-width: 2.5;
  }
  /* Sonar pulse — two layered circles scale outward and fade */
  .chart .point-current-pulse {
    fill: var(--chart-blue);
    transform-origin: center;
    transform-box: fill-box;
    animation: sonar 2.6s cubic-bezier(0,0,.2,1) infinite;
  }
  .chart .point-current-pulse.delay { animation-delay: 1.3s; }
  @keyframes sonar {
    0%   { transform: scale(1);   opacity: 0.55; }
    80%  { opacity: 0; }
    100% { transform: scale(5);   opacity: 0; }
  }
  /* Vertical guide from current point down to baseline */
  .chart .current-guide {
    stroke: var(--gold);
    stroke-width: 1;
    stroke-dasharray: 2 3;
    opacity: .35;
  }
  /* Callout */
  .chart .callout-line {
    stroke: var(--gold);
    stroke-width: 1;
    stroke-dasharray: 2 3;
    opacity: .65;
  }
  .chart .callout-bg {
    fill: var(--paper-card);
    stroke: rgba(184, 150, 90, .35);
    stroke-width: 1;
  }
  .chart .callout-text {
    font-family: var(--display);
    font-size: 22px;
    fill: var(--chart-blue-deep);
    letter-spacing: -.02em;
    font-weight: 500;
  }
  .chart .callout-sub {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .14em;
    text-transform: uppercase;
    fill: var(--ink-faint);
  }
  /* Recommended-list horizontal line: cleaner approach — dashed line across,
     small brick text tag at right with NO background box (per feedback). */
  .chart .rec-line {
    stroke: var(--brick);
    stroke-opacity: .9;
    stroke-width: 1;
    stroke-dasharray: 4 4;
  }
  .chart .rec-tag-text {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .16em;
    text-transform: uppercase;
    fill: var(--brick);
    font-weight: 500;
  }
  .chart .rec-tag-num {
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: -.02em;
    fill: var(--brick);
  }

  /* Subtle, elegant "alive" sway on the line group.
     Slow and small — a breath, not a bounce. */
  @keyframes chartSway {
    0%, 100% { transform: translateY(0); }
    50%     { transform: translateY(-1.6px); }
  }
  .chart .line-group {
    animation: chartSway 5.8s ease-in-out infinite;
    transform-origin: 50% 100%;
    transform-box: fill-box;
  }
  @media (prefers-reduced-motion: reduce) {
    .chart .line-group,
    .chart .point-current-pulse { animation: none !important; opacity: 0 !important; }
  }

  /* ===== Graceful: market snapshot coming soon ===== */
  .area--empty .area-stats,
  .area--empty .chart-wrap { display: none; }
  .area:not(.area--empty) .empty { display: none; }
  .area--empty .empty {
    margin-top: 18px;
    padding: 38px 28px;
    border: 1px solid var(--paper-line);
    border-radius: var(--r-md);
    background: var(--paper-card);
    text-align: center;
  }
  .area--empty .empty .icon {
    width: 26px; height: 26px;
    margin: 0 auto 14px;
    border-radius: 50%;
    border: 1px solid var(--paper-line);
    display: grid; place-items: center;
    color: var(--ink-faint);
  }
  .area--empty .empty .h {
    font-family: var(--display);
    font-size: 22px;
    line-height: 1.2;
    letter-spacing: -.01em;
    color: var(--ink);
    font-style: italic;
  }
  .area--empty .empty .p {
    font-family: var(--ui);
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 8px;
    line-height: 1.55;
  }

  /* ===== Graceful: agent monogram fallback ===== */
  .agent-photo--monogram {
    background: linear-gradient(135deg, #2A241F 0%, #1A1612 100%) !important;
    display: grid; place-items: center;
  }
  .agent-photo--monogram::before {
    content: attr(data-monogram);
    font-family: var(--display);
    font-size: 36px;
    color: #F4EFE4;
    letter-spacing: -.02em;
    line-height: 1;
  }
  /* ===== Recent area sales — structured cards w/ directional deltas ===== */
  .area {
    padding: 56px 28px;
    background: var(--paper);
    border-bottom: 1px solid var(--paper-line);
  }
  .area-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--paper-line);
    border: 1px solid var(--paper-line);
    border-radius: 10px;
    overflow: hidden;
  }
  .as {
    padding: 22px 18px 20px;
    background: var(--paper-raise);
    border: 0;
    display: flex; flex-direction: column;
    gap: 10px;
  }
  .as:nth-child(odd) { padding-right: 18px; border-right: 0; }
  .as:nth-child(even) { padding-left: 18px; }
  .as:nth-last-child(-n+2) { border-bottom: 0; }
  .as .l {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 0;
  }
  .as .v {
    font-family: var(--display);
    font-size: 40px;
    line-height: 1;
    letter-spacing: -.025em;
    color: var(--gold-warm);
  }
  .as .ctx {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .08em;
    color: var(--ink-muted);
    line-height: 1.4;
    margin-top: 0;
    display: flex; align-items: center; gap: 6px;
  }
  .as .ctx .pos { color: var(--pos); font-weight: 500; }
  .as .ctx .neg { color: var(--brick); font-weight: 500; }

  .trend {
    margin-top: 26px;
    padding-top: 6px;
  }
  .trend .l {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
  }
  .spark {
    display: flex; align-items: flex-end;
    gap: 6px;
    height: 56px;
  }
  .spark .bar {
    flex: 1;
    background: var(--ink);
    opacity: .12;
    border-radius: 1px;
    transition: opacity .2s var(--ease);
  }
  .spark .bar.acc { opacity: .85; background: var(--brick); }
  .spark .bar.cur { opacity: 1; background: var(--ink); }
  .trend-axis {
    display: flex; justify-content: space-between;
    margin-top: 8px;
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  /* ===== Editorial detail + buyer quote (photo band + dark-ink panel) ===== */
  .editorial-pair {
    border-bottom: 1px solid var(--paper-line);
  }
  .editorial-photo {
    height: 280px;
    background:
      url("170f7c74-0574-4a3b-8d67-5f559cd24e72") center 40% / cover no-repeat,
      #b9a78a;
  }
  .quote-panel {
    background: #16110D;
    color: #F4EFE4;
    padding: 48px 28px 52px;
  }
  .quote-panel .qmark {
    font-family: var(--display);
    font-style: italic;
    font-size: 56px;
    line-height: .6;
    color: var(--brick);
    margin-bottom: 8px;
    display: block;
  }
  .quote-panel .quote-body {
    font-family: var(--display);
    font-style: italic;
    font-size: 26px;
    line-height: 1.28;
    letter-spacing: -.015em;
    color: #F4EFE4;
    margin: 0 0 22px;
    max-width: 28ch;
  }
  .quote-panel .quote-att {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(244,239,228,.55);
    display: flex; align-items: center; gap: 12px;
  }
  .quote-panel .quote-att::before {
    content: "";
    width: 24px; height: 1px;
    background: currentColor;
    opacity: .5;
  }

  /* ===== Your agent ===== */
  .agent {
    background: var(--ink);
    color: #F4EFE4;
    padding: 56px 28px 48px;
    position: relative;
  }
  .agent .sec-label { color: rgba(244,239,228,.55); }
  .agent .sec-label .num { color: var(--gold); }
  .agent .sec-label .num::before { background: var(--mint); }
  .agent .sec-label .lbl { background: rgba(244,239,228,.16); }
  .agent .sec-label .name { color: rgba(244,239,228,.55); }
  .agent .sec-title { color: #F4EFE4; }

  .agent-card {
    display: grid;
    grid-template-columns: 92px 1fr;
    gap: 20px;
    align-items: center;
    margin-top: 8px;
    padding-bottom: 28px;
    border-bottom: 1px solid rgba(244,239,228,.12);
  }
  .agent-photo {
    width: 92px; height: 92px;
    border-radius: 50%;
    background:
      url("07d69447-ecda-4653-8f33-6a29df302392") center / cover no-repeat,
      #5e544a;
    position: relative;
    border: 1px solid rgba(244,239,228,.18);
  }
  .agent-photo .verify {
    position: absolute;
    right: -2px; bottom: -2px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--mint);
    color: #0A2A24;
    display: grid; place-items: center;
    border: 2px solid var(--ink);
  }
  .agent-photo .verify svg {
    width: 11px; height: 11px;
    stroke: currentColor; stroke-width: 2.2;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
  }
  .agent-name {
    font-family: var(--display);
    font-weight: 400;
    font-size: 32px;
    letter-spacing: -.015em;
    line-height: 1;
    color: #F4EFE4;
  }
  .agent-role {
    margin-top: 8px;
    font-size: 13px;
    color: rgba(244,239,228,.65);
    line-height: 1.5;
  }
  .agent-role em {
    font-style: italic;
    color: rgba(244,239,228,.85);
    font-family: var(--display);
    font-size: 14px;
  }

  .agent-bio {
    padding: 26px 0 28px;
    font-family: var(--display);
    font-style: italic;
    font-size: 18px;
    line-height: 1.4;
    letter-spacing: -.005em;
    color: rgba(244,239,228,.82);
    border-bottom: 1px solid rgba(244,239,228,.12);
    max-width: 36ch;
  }

  .agent-meta {
    padding-top: 26px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px 18px;
  }
  .am .l {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: rgba(244,239,228,.45);
    margin-bottom: 6px;
  }
  .am .v {
    font-size: 13.5px;
    color: #F4EFE4;
    line-height: 1.45;
    letter-spacing: -.005em;
  }
  .am .v.mono {
    font-family: var(--mono);
    font-size: 12.5px;
    letter-spacing: .02em;
  }

  .agent-ctas {
    margin-top: 32px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .cta {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px;
    border-radius: var(--r-pill);
    font-family: var(--ui);
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    letter-spacing: -.005em;
    transition: transform .14s var(--ease), background .14s var(--ease);
  }
  .cta:hover { transform: translateY(-1px); }
  .cta.primary {
    background: #F4EFE4;
    color: var(--ink);
  }
  .cta.outline {
    background: transparent;
    color: #F4EFE4;
    border: 1px solid rgba(244,239,228,.32);
  }
  .cta .ar {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--ink);
    color: #F4EFE4;
    display: grid; place-items: center;
  }
  .cta.outline .ar { background: #F4EFE4; color: var(--ink); }
  .cta .ar svg {
    width: 11px; height: 11px;
    stroke: currentColor; stroke-width: 1.8;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ===== Foot ===== */
  .foot {
    padding: 34px 28px 40px;
    background: var(--ink);
    color: rgba(244,239,228,.45);
    border-top: 1px solid rgba(244,239,228,.08);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    line-height: 1.7;
  }
  .foot .row {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px;
  }
  .foot .brand {
    display: flex; align-items: center; gap: 8px;
    color: rgba(244,239,228,.65);
  }
  .foot .brand .glyph {
    width: 16px; height: 16px;
    border-radius: 4px;
    background: var(--mint);
    color: #0A2A24;
    display: grid; place-items: center;
    font-family: var(--display); font-size: 12px; font-style: italic;

  }
  .foot .brand .wm {

    font-size: 13px;
    color: rgba(244,239,228,.85);
    text-transform: none;
    letter-spacing: -.01em;
  }
  .foot .brand .wm em { font-style: italic; color: var(--mint); }
  .foot .small {
    margin-top: 18px;
    color: rgba(244,239,228,.32);
    line-height: 1.7;
  }

  /* ===== Stage-level legend (annotation block — outside the rendered page) ===== */
  .legend {
    width: 100%; max-width: 460px;
    color: var(--ink-muted);
    font-size: 12px;
    line-height: 1.6;
    font-family: var(--mono);
    letter-spacing: .04em;
  }
  .legend .ttl {
    color: var(--ink);
    font-family: var(--display);
    font-size: 20px;
    letter-spacing: -.01em;
    margin-bottom: 8px;
    text-transform: none;
  }
  .legend a { color: var(--brick); text-decoration: none; }

  /* ============================================
     MOTION LAYER (CSS-first)
     Reveal ease + 3 durations · structural, never decorative
     ============================================ */
  :root {
    --r-ease: cubic-bezier(.16,.84,.3,1);
    --r-quick: 140ms;
    --r-std:   220ms;
    --r-slow:  360ms;
    --r-rise:  640ms; /* reveal duration */
  }

  /* ---- scroll-reveal primitives (restraint mode — opacity-only, no slide) ---- */
  .reveal {
    opacity: 0;
    transition: opacity 720ms var(--r-ease);
    will-change: opacity;
  }
  .reveal.in { opacity: 1; }
  /* stagger left intentionally as a no-op so legacy markup still works */
  .stagger > * { transition-delay: 0ms; }

  /* ---- hero Ken Burns (slow, barely-perceptible) ---- */
  .hero { overflow: hidden; }
  @keyframes kenburns {
    from { transform: scale(1) translate3d(0,0,0); }
    to   { transform: scale(1.035) translate3d(-1.2%, .8%, 0); }
  }

  /* ---- price reveal removed: hero price is always visible (no reveal animation) ---- */
  .price-reveal { opacity: 1 !important; -webkit-clip-path: none !important; clip-path: none !important; transform: none !important; }

  /* ---- CTA micro-interactions ---- */
  .cta .ar { transition: transform var(--r-quick) var(--r-ease), background var(--r-quick) var(--r-ease); }
  .cta:hover .ar { transform: translateX(3px); }
  .cta.primary:hover { background: #FFFCF4; }
  .cta.outline:hover { background: rgba(244,239,228,.08); border-color: rgba(244,239,228,.55); }

  /* ---- verified tick entrance (delayed) ---- */
  .agent-photo .verify {
    transform: scale(.3);
    opacity: 0;
    transition:
      transform 420ms var(--r-ease) 220ms,
      opacity 240ms ease-out 220ms;
  }
  .agent-photo.in .verify {
    transform: scale(1);
    opacity: 1;
  }

  /* ---- chart line draw-on ---- */
  .chart .area-fill {
    opacity: 0;
    transition: opacity 520ms var(--r-ease) 120ms;
  }
  .chart .line-stroke {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    transition: stroke-dashoffset 1100ms var(--r-ease) 80ms;
  }
  .chart .point {
    opacity: 0;
    transform: scale(.5);
    transform-origin: center;
    transition: opacity 240ms var(--r-ease) 900ms, transform 320ms var(--r-ease) 900ms;
  }
  .chart.in .area-fill { opacity: 1; }
  .chart.in .line-stroke { stroke-dashoffset: 0; }
  .chart.in .point { opacity: 1; transform: scale(1); }

  /* ---- reduced motion ---- */
  @media (prefers-reduced-motion: reduce) {
    .reveal, .price-reveal, .agent-photo .verify,
    .chart .line-stroke, .chart .area-fill, .chart .point {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
      -webkit-clip-path: none !important;
              clip-path: none !important;
      stroke-dashoffset: 0 !important;
    }
    .hero-photo { animation: none !important; }

<style>
  /* ============================================
     STUDIO SEP — Seller Presentation (Consumer)
     Warm paper register · mobile-first · editorial
     ============================================ */
  :root {
    --paper: #F1EBE0;
    --paper-deep: #E8E0D2;
    --paper-raise: #FBF7EE;
    --paper-card: #FCF9F2;
    --paper-line: #E0D6C5;
    --paper-line-soft: #EAE1D0;
    --ink: #1A1612;
    --ink-2: #2A241F;
    --ink-muted: #6E665B;
    --ink-faint: #A29888;
    --mint: #4EF2D9;
    --mint-deep: #1F8F7C;
    --gold: #C9A86A;
    --gold-warm: #B8965A;
    --brick: #C26A4E;
    --brick-deep: #A85439;
    --rose: #D29A9A;
    --pos: #1D9E75;
    --pos-bright: #6EE7A8;
    --chart-blue: #3F6C8E;
    --chart-blue-deep: #2C5474;
    --display: "Instrument Serif", "Iowan Old Style", Georgia, serif;
    --ui: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --mono: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --r-md: 10px; --r-lg: 14px; --r-xl: 20px; --r-2xl: 28px; --r-pill: 999px;
    --ease: cubic-bezier(.2,.7,.1,1);
    --shadow-card: 0 1px 0 rgba(255,255,255,.7) inset, 0 18px 40px -26px rgba(40,28,16,.18);
    --shadow-paper: 0 1px 0 rgba(255,255,255,.6) inset, 0 32px 80px -40px rgba(40,28,16,.22);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--ui);
    background: var(--paper-deep);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    font-feature-settings: "ss01", "cv11";
    min-height: 100vh;
  }

  /* ===== Outer stage (so the phone-width page feels presented) ===== */
  .stage {
    min-height: 100vh;
    padding: 56px 24px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    background:
      radial-gradient(60% 40% at 50% 0%, #F1E9DA 0%, transparent 60%),
      var(--paper-deep);
  }
  .stage-head {
    width: 100%; max-width: 460px;
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--mono); font-size: 10.5px;
    color: var(--ink-faint); letter-spacing: .14em; text-transform: uppercase;
  }
  .stage-head .brand {
    display: flex; align-items: center; gap: 10px;
    color: var(--ink-muted);
  }
  .stage-head .brand .glyph {
    width: 18px; height: 18px;
    border-radius: 5px;
    background: var(--mint);
    color: #0A2A24;
    display: grid; place-items: center;
    font-family: var(--display); font-size: 13px; font-style: italic;
    letter-spacing: -.02em; line-height: 1;
  }
  .stage-head .brand .wordmark {
    font-family: var(--display); font-size: 15px;
    color: var(--ink); letter-spacing: -.01em;
    text-transform: none;
  }
  .stage-head .brand .wordmark em { font-style: italic; color: var(--mint-deep); }
  .stage-head .url { text-transform: lowercase; letter-spacing: .04em; }

  /* ===== The page itself ===== */
  .page {
    width: 100%;
    max-width: 430px;
    background: var(--paper);
    border-radius: 32px;
    overflow: hidden;
    box-shadow: var(--shadow-paper);
    position: relative;
    color: var(--ink);
  }

  /* ===== Top app-bar inside the page ===== */
  .appbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 18px 22px 14px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 5;
    background: linear-gradient(180deg, rgba(0,0,0,.32) 0%, rgba(0,0,0,0) 100%);
    color: #fbf6ec;
  }
  .appbar .prepared {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    opacity: .9;
  }
  .appbar .share {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,.14);
    backdrop-filter: blur(8px);
    display: grid; place-items: center;
    border: 1px solid rgba(255,255,255,.18);
  }
  .appbar .share svg {
    width: 14px; height: 14px;
    stroke: #fbf6ec; stroke-width: 1.5;
    fill: none; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ===== Hero photo (clean band — no text over the image) ===== */
  .hero {
    position: relative;
    height: 480px;
    background: #1A1612;
    color: #fbf6ec;
    overflow: hidden;
    margin-bottom: 0;
  }
  /* 1px inset frame — subtle craft detail */
  .hero::after {
    content: "";
    position: absolute;
    inset: 14px;
    border: 1px solid rgba(255,255,255,.10);
    pointer-events: none;
    z-index: 4;
  }
  .hero-photo {
    position: absolute;
    inset: -2%;
    background:
      url("9852360d-e764-4f4d-b47d-aed100095ba1") center 38% / cover no-repeat,
      #c8b69a;
    z-index: 0;
    animation: kenburns 22s cubic-bezier(.4,.0,.6,1) forwards;
    transform-origin: 50% 45%;
  }
  .hero .appbar { position: relative; z-index: 2; }

  /* ===== Caption card — dark ink, overlaps bottom of photo ===== */
  .caption-wrap {
    position: relative;
    margin: -44px 18px 0; /* overlap the photo by 44px */
    z-index: 3;
  }
  .caption-card {
    background: #16110D;
    color: #F4EFE4;
    border-radius: 14px;
    padding: 22px 26px 26px;
    box-shadow:
      0 1px 0 rgba(255,255,255,.05) inset,
      0 22px 50px -28px rgba(20,12,4,.55),
      0 6px 18px -10px rgba(20,12,4,.35);
    border: 1px solid rgba(255,255,255,.04);
  }
  .caption-card .for {
    font-family: var(--mono);
    font-size: 9.5px;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--mint);
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
  }
  .caption-card .for::before {
    content: "";
    width: 6px; height: 6px;
    background: var(--mint);
    border-radius: 50%;
  }
  .caption-card .kicker {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(244,239,228,.65);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .caption-card .kicker::before {
    content: "";
    width: 18px; height: 1px;
    background: currentColor;
    opacity: .55;
  }
  .caption-card .addr {
    font-family: var(--display);
    font-weight: 400;
    font-size: 40px;
    line-height: 1.02;
    letter-spacing: -.025em;
    margin: 0;
    color: #F4EFE4;
    /* Avoid the street number breaking from "Kenilworth" */
    text-wrap: balance;
  }
  .caption-card .addr em {
    font-style: italic;
    display: block;
    margin-top: 2px;
  }
  .caption-card .city {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    margin-top: 18px;
    padding-top: 18px;
    border-top: 1px solid rgba(244,239,228,.12);
    color: rgba(244,239,228,.55);
  }

  /* ===== Price panel directly below caption card ===== */
  /* HERO PRICE TREATMENT — oversized serif w/ brick side accent */
  .price-panel {
    padding: 52px 28px 40px;
    margin-top: 0;
    background: var(--paper-raise);
    border-bottom: 1px solid var(--paper-line);
    position: relative;
  }
  .price-panel::before {
    /* brick vertical accent bar */
    content: "";
    position: absolute;
    left: 28px; top: 52px;
    width: 3px; height: calc(100% - 92px);
    background: var(--brick);
  }
  .price-panel .lbl {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--brick);
    margin-bottom: 18px;
    padding-left: 18px;
    display: flex; align-items: center; gap: 10px;
  }
  .price-panel .lbl::before { display: none; }
  .price-panel .price {
    border-bottom: 1px solid var(--paper-line-soft);
    padding: 0 0 26px 18px;
  }
  .price-panel .rationale {
    padding-left: 18px;
  }

  /* ===== Personal note from agent (warm paper, between caption + price) ===== */
  .personal-note {
    margin: 18px 0 0;
    padding: 36px 28px 30px;
    background: var(--paper);
    text-align: left;
    position: relative;
  }
  .personal-note .from {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .personal-note .from::before {
    content: "";
    width: 18px; height: 1px;
    background: currentColor;
    opacity: .55;
  }
  .personal-note .pn-body {
    font-family: var(--display);
    font-style: italic;
    font-size: 24px;
    line-height: 1.28;
    letter-spacing: -.015em;
    color: var(--ink);
    margin: 0;
    max-width: 30ch;
  }
  .personal-note .sig {
    margin-top: 18px;
    font-family: var(--display);
    font-style: italic;
    font-size: 17px;
    letter-spacing: -.005em;
    color: var(--brick);
  }
  .personal-note .sig::before {
    content: "";
    display: inline-block;
    width: 22px; height: 1px;
    background: var(--brick);
    vertical-align: middle;
    margin-right: 10px;
    opacity: .8;
  }

  /* ===== Track record block — DARK CHAPTER ===== */
  .track {
    padding: 64px 28px 60px;
    border-bottom: 1px solid rgba(0,0,0,.4);
    background:
      radial-gradient(120% 60% at 0% 0%, rgba(201,168,106,.06) 0%, transparent 60%),
      linear-gradient(180deg, #1A1612 0%, #14110D 100%);
    color: #F4EFE4;
    position: relative;
  }
  .track .sec-label { color: rgba(244,239,228,.55); }
  .track .sec-label .num { color: var(--gold); }
  .track .sec-label .num::before { background: var(--mint); }
  .track .sec-label .lbl { background: rgba(244,239,228,.16); }
  .track .sec-label .name { color: rgba(244,239,228,.55); }
  .track .sec-title { color: #F4EFE4; max-width: 14ch; }
  .track .sec-title em { color: var(--gold); font-style: italic; }
  .track .sec-body { color: rgba(244,239,228,.72); }

  /* Structured stat ROWS on the dark chapter — horizontal layout
     for clean baselines: [BIG NUMBER]  |  LABEL / descriptor */
  .track-figures {
    margin-top: 40px;
    border-top: 1px solid rgba(244,239,228,.14);
    border-bottom: 1px solid rgba(244,239,228,.14);
  }
  .tf {
    padding: 28px 0 26px;
    border-bottom: 1px solid rgba(244,239,228,.10);
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 28px;
    align-items: center;
    background: transparent;
  }
  .tf:last-child { border-bottom: 0; }
  .tf .v {
    font-family: var(--display);
    font-size: 64px;
    line-height: .9;
    letter-spacing: -.035em;
    color: var(--gold);
    display: flex;
    align-items: baseline;
  }
  .tf .v em {
    font-style: italic;
    font-size: 30px;
    color: rgba(201,168,106,.65);
    letter-spacing: -.02em;
    margin-left: 2px;
  }
  .tf .l {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: rgba(244,239,228,.5);
    line-height: 1.4;
  }
  .tf .l strong {
    display: block;
    color: #F4EFE4;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: .14em;
    font-size: 11px;
  }
  .tf .l small {
    display: block;
    font-family: var(--ui);
    font-size: 13px;
    color: rgba(244,239,228,.62);
    letter-spacing: 0;
    text-transform: none;
    margin-top: 0;
    line-height: 1.45;
    font-weight: 400;
    max-width: 30ch;
  }

  /* Past-seller testimonial on the dark chapter */
  .testimonial {
    margin-top: 40px;
    padding-top: 4px;
    display: grid;
    grid-template-columns: 22px 1fr;
    gap: 18px;
    align-items: start;
  }
  .testimonial .rule {
    width: 1px;
    background: var(--brick);
    align-self: stretch;
    margin-top: 6px;
    opacity: .9;
  }
  .testimonial .ts-body {
    font-family: var(--display);
    font-style: italic;
    font-size: 22px;
    line-height: 1.32;
    letter-spacing: -.01em;
    color: #F4EFE4;
    margin: 0 0 16px;
    max-width: 36ch;
  }
  .testimonial .att {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: rgba(244,239,228,.5);
    display: flex; align-items: center; gap: 10px;
  }
  .testimonial .att .nm { color: rgba(244,239,228,.85); font-weight: 500; }

  /* ===== CTA reassurance microcopy ===== */
  .cta-reassure {
    margin: 14px 22px 0;
    font-family: var(--ui);
    font-size: 12.5px;
    line-height: 1.55;
    color: rgba(244,239,228,.55);
    font-style: italic;
    letter-spacing: -.005em;
    text-align: center;
  }

  /* ============================================
     VIDEO BLOCK (optional — hides if no video)
     ============================================ */
  .video-block {
    padding: 56px 28px;
    background: var(--paper-card);
    border-bottom: 1px solid var(--paper-line);
  }
  .video-block .sec-title { max-width: 14ch; }
  .video-poster {
    margin-top: 28px;
    position: relative;
    aspect-ratio: 4 / 5;
    border-radius: var(--r-md);
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(20,14,8,.55) 100%),
      url("7a6f56bc-31d1-48cf-844e-b9d6407b6783") center 25% / cover no-repeat,
      #5e544a;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: transform var(--ease) 220ms;
  }
  /* subtle inset frame, mirrors hero photo */
  .video-poster::after {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(255,255,255,.18);
    pointer-events: none;
    border-radius: 4px;
  }
  .video-poster:hover { transform: translateY(-2px); }
  .video-poster .play {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    border-radius: 50%;
    background: rgba(244,239,228,.92);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.4);
    display: grid; place-items: center;
    transition: background var(--ease) 140ms, transform var(--ease) 140ms;
  }
  .video-poster:hover .play { background: #FFFFFF; transform: translate(-50%, -50%) scale(1.04); }
  .video-poster .play::before {
    content: "";
    width: 0; height: 0;
    border-left: 14px solid var(--ink);
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    margin-left: 4px;
  }
  .video-poster .meta {
    position: absolute;
    left: 22px; bottom: 22px; right: 22px;
    color: #fbf6ec;
    z-index: 2;
  }
  .video-poster .meta .ttl {
    font-family: var(--display);
    font-size: 24px;
    line-height: 1.18;
    letter-spacing: -.015em;
    text-shadow: 0 1px 1px rgba(0,0,0,.55), 0 2px 18px rgba(0,0,0,.45);
    max-width: 22ch;
  }
  .video-poster .meta .ttl em { font-style: italic; }
  .video-poster .meta .runtime {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    opacity: .88;
    margin-top: 10px;
    display: flex; align-items: center; gap: 10px;
  }
  .video-poster .meta .runtime::before {
    content: "";
    width: 18px; height: 1px;
    background: currentColor;
    opacity: .55;
  }

  /* ============================================
     REVIEWS BLOCK (optional — hides if no reviews)
     ============================================ */
  .reviews {
    padding: 60px 28px 56px;
    background: var(--paper-raise);
    border-bottom: 1px solid var(--paper-line);
  }
  .reviews .sec-title { max-width: 16ch; }
  .reviews-list {
    margin-top: 32px;
    display: flex; flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--paper-line-soft);
  }
  .review {
    padding: 26px 0 24px;
    border-bottom: 1px solid var(--paper-line-soft);
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 18px;
    align-items: start;
  }
  .review .qm {
    font-family: var(--display);
    font-style: italic;
    font-size: 32px;
    line-height: .5;
    color: var(--rose);
    padding-top: 18px;
    width: 18px;
    text-align: center;
  }
  .review .rv-body {
    font-family: var(--display);
    font-size: 19px;
    line-height: 1.36;
    letter-spacing: -.005em;
    color: var(--ink);
    margin: 0 0 14px;
    max-width: 36ch;
  }
  .review .rv-body em { font-style: italic; }
  .review .att {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .review .att .nm { color: var(--ink-muted); font-weight: 500; }
  .reviews-outlink {
    margin-top: 24px;
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--ui);
    font-size: 13px;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--brick);
    padding-bottom: 2px;
    letter-spacing: -.005em;
    transition: gap var(--ease) 140ms;
  }
  .reviews-outlink:hover { gap: 14px; }
  .reviews-outlink::after {
    content: "→";
    color: var(--brick);
    font-size: 14px;
  }

  /* ============================================
     Closing mark (signature mint dot at the end)
     ============================================ */
  .end-mark {
    text-align: center;
    padding: 36px 28px 18px;
    background: var(--ink);
  }
  .end-mark .dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: var(--mint);
    border-radius: 50%;
    margin: 0 6px;
    vertical-align: middle;
  }
  .end-mark .rule {
    display: inline-block;
    width: 18px; height: 1px;
    background: rgba(244,239,228,.18);
    vertical-align: middle;
  }
  .price {
    font-family: var(--display);
    font-weight: 400;
    font-size: 108px;
    line-height: .88;
    letter-spacing: -.04em;
    color: var(--ink);
    display: flex; align-items: flex-start;
  }
  .price .dollar {
    font-size: 42px;
    line-height: 1;
    margin: 10px 4px 0 0;
    color: var(--brick);
    letter-spacing: -.02em;
  }
  .rationale {
    margin-top: 22px;
    font-family: var(--display);
    font-style: italic;
    font-size: 22px;
    line-height: 1.28;
    letter-spacing: -.01em;
    color: var(--ink-2);
    max-width: 32ch;
  }
  .rationale::before {
    content: "";
    display: block;
    width: 28px; height: 1px;
    background: var(--brick);
    margin-bottom: 18px;
  }

  /* ===== Section scaffolding ===== */
  section.block {
    padding: 56px 28px;
    border-bottom: 1px solid var(--paper-line);
  }
  section.block:last-of-type { border-bottom: 0; }
  /* Background variants for editorial rhythm */
  section.block.paper { background: var(--paper); }
  section.block.raise { background: var(--paper-raise); }
  section.block.card { background: var(--paper-card); }

  /* ===== Refined numbered-section ornament =====
     [mint dot] [italic serif numeral] [hairline] [mono label]
     ============================================ */
  .sec-label {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 22px;
    display: flex; align-items: center; gap: 14px;
  }
  .sec-label::after { display: none; }
  .sec-label .num {
    font-family: var(--display);
    font-style: italic;
    font-size: 17px;
    line-height: 1;
    letter-spacing: -.01em;
    color: var(--brick);
    text-transform: none;
    position: relative;
    padding-left: 14px;
    font-weight: 400;
  }
  .sec-label .num::before {
    content: "";
    position: absolute;
    left: 0; top: 50%;
    width: 5px; height: 5px;
    background: var(--mint);
    border-radius: 50%;
    transform: translateY(-50%);
  }
  .sec-label .lbl {
    flex: 1;
    height: 1px;
    background: var(--paper-line);
    align-self: center;
  }
  .sec-label .name {
    color: var(--ink-muted);
    letter-spacing: .18em;
    text-transform: uppercase;
    font-family: var(--mono);
    font-size: 10.5px;
  }
  .sec-title {
    font-family: var(--display);
    font-weight: 400;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -.025em;
    margin: 0 0 22px;
    color: var(--ink);
    max-width: 12ch;
  }
  .sec-title em { font-style: italic; }
  .sec-body {
    font-size: 16px;
    line-height: 1.55;
    color: var(--ink-2);
    margin: 0;
    max-width: 38ch;
  }
  .sec-body + .sec-body { margin-top: 14px; }

  /* Serif drop-cap (used on the first paragraph of “Why this price”) */
  .sec-body.drop-cap::first-letter {
    font-family: var(--display);
    font-size: 64px;
    line-height: .85;
    float: left;
    color: var(--brick);
    padding: 4px 12px 0 0;
    margin-top: 4px;
    font-style: italic;
    letter-spacing: -.02em;
  }

  /* ===== Why this price — comps ===== */
  .comps {
    margin-top: 36px;
    border-top: 1px solid var(--paper-line-soft);
  }
  .comp {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: baseline;
    gap: 16px;
    padding: 22px 0;
    border-bottom: 1px solid var(--paper-line-soft);
  }
  .comp .idx {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: .12em;
    line-height: 1.3;
    padding-top: 4px;
  }
  .comp .addr {
    font-family: var(--display);
    font-size: 21px;
    line-height: 1.18;
    letter-spacing: -.01em;
    color: var(--ink);
  }
  .comp .addr small {
    display: block;
    font-family: var(--ui);
    font-size: 11.5px;
    color: var(--ink-muted);
    letter-spacing: 0;
    margin-top: 3px;
    font-weight: 400;
  }
  .comp .sold {
    font-family: var(--display);
    font-size: 24px;
    color: var(--ink);
    letter-spacing: -.015em;
    text-align: right;
    line-height: 1;
  }
  .comp .sold small {
    display: block;
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 400;
  }
  .comps-note {
    margin-top: 18px;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: .06em;
    line-height: 1.6;
  }

  /* graceful missing-comp state */
  .comp.missing {
    grid-template-columns: 28px 1fr;
    color: var(--ink-faint);
  }
  .comp.missing .addr {
    font-family: var(--ui);
    font-size: 13px;
    font-style: italic;
    color: var(--ink-faint);
    letter-spacing: 0;
  }

  /* ===== "What I'll do for you" — pitch points ===== */
  .pitch {
    background: var(--paper-card);
    margin: 0;
    padding: 56px 28px;
    border-bottom: 1px solid var(--paper-line);
    position: relative;
  }
  .pitch .sec-title { max-width: 14ch; }
  .pitches {
    margin-top: 32px;
    display: flex; flex-direction: column;
    gap: 28px;
  }
  .pp {
    display: grid;
    grid-template-columns: 40px 1fr;
    gap: 18px;
    align-items: baseline;
  }
  .pp .n {
    font-family: var(--display);
    font-style: italic;
    font-size: 30px;
    color: var(--brick);
    line-height: 1;
    letter-spacing: -.01em;
    padding-top: 2px;
  }
  .pp .t {
    font-family: var(--display);
    font-size: 22px;
    line-height: 1.22;
    letter-spacing: -.015em;
    color: var(--ink);
  }
  .pp .t small {
    display: block;
    font-family: var(--ui);
    font-size: 13.5px;
    color: var(--ink-muted);
    line-height: 1.5;
    margin-top: 6px;
    letter-spacing: 0;
  }

  /* ===== Recent area sales (kept as comment anchor) ===== */
  /* (styles consolidated into the new block above) */

  /* ===== area-head (kept) ===== */
  .area-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 28px;
  }
  .area-head .zip {
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--ink-faint);
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .chart-wrap {
    margin-top: 36px;
    padding: 44px 28px 40px;
    background: linear-gradient(180deg, #FCF9F2 0%, #FBF6EA 100%);
    border: 1px solid var(--paper-line);
    border-radius: 14px;
  }
  .chart-head {
    display: flex; justify-content: space-between; align-items: flex-end;
    margin-bottom: 44px;
  }
  .chart-head .l {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--ink-faint);
    line-height: 1.4;
  }
  .chart-head .l strong {
    display: block;
    color: var(--ink-muted);
    font-weight: 500;
    margin-bottom: 4px;
    font-size: 10px;
    letter-spacing: .16em;
  }
  .chart-head .pct {
    font-family: var(--display);
    font-size: 28px;
    line-height: 1;
    letter-spacing: -.02em;
    color: var(--pos);
    display: flex; align-items: baseline; gap: 8px;
  }
  .chart-head .pct small {
    font-family: var(--mono);
    font-size: 9.5px;
    color: var(--ink-faint);
    letter-spacing: .14em;
    text-transform: uppercase;
  }
  .chart {
    width: 100%;
    display: block;
    overflow: visible;
    font-family: var(--mono);
  }
  .chart .gridline { stroke: var(--paper-line-soft); stroke-width: 1; }
  .chart .baseline { stroke: var(--ink); stroke-opacity: .22; stroke-width: 1; }
  .chart .y-label, .chart .x-label {
    font-size: 8.5px;
    letter-spacing: .14em;
    text-transform: uppercase;
    fill: var(--ink-faint);
  }
  /* Engaging area fill — gradient that intensifies toward the current month */
  .chart .area-fill {
    fill: url(#chartFill);
  }
  .chart .line-stroke {
    fill: none;
    stroke: var(--chart-blue);
    stroke-width: 2.6;
    stroke-linejoin: round;
    stroke-linecap: round;
  }
  /* Small subtle dots at each month */
  .chart .point {
    fill: var(--paper-card);
    stroke: var(--chart-blue);
    stroke-width: 1.4;
  }
  /* Current month — layered marker: a soft ring + filled dot */
  .chart .point-current-ring {
    fill: rgba(63, 108, 142, .22);
    stroke: none;
  }
  .chart .point-current {
    fill: var(--chart-blue);
    stroke: var(--paper-card);
    stroke-width: 2.5;
  }
  /* Sonar pulse — two layered circles scale outward and fade */
  .chart .point-current-pulse {
    fill: var(--chart-blue);
    transform-origin: center;
    transform-box: fill-box;
    animation: sonar 2.6s cubic-bezier(0,0,.2,1) infinite;
  }
  .chart .point-current-pulse.delay { animation-delay: 1.3s; }
  @keyframes sonar {
    0%   { transform: scale(1);   opacity: 0.55; }
    80%  { opacity: 0; }
    100% { transform: scale(5);   opacity: 0; }
  }
  /* Vertical guide from current point down to baseline */
  .chart .current-guide {
    stroke: var(--gold);
    stroke-width: 1;
    stroke-dasharray: 2 3;
    opacity: .35;
  }
  /* Callout */
  .chart .callout-line {
    stroke: var(--gold);
    stroke-width: 1;
    stroke-dasharray: 2 3;
    opacity: .65;
  }
  .chart .callout-bg {
    fill: var(--paper-card);
    stroke: rgba(184, 150, 90, .35);
    stroke-width: 1;
  }
  .chart .callout-text {
    font-family: var(--display);
    font-size: 22px;
    fill: var(--chart-blue-deep);
    letter-spacing: -.02em;
    font-weight: 500;
  }
  .chart .callout-sub {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .14em;
    text-transform: uppercase;
    fill: var(--ink-faint);
  }
  /* Recommended-list horizontal line: cleaner approach — dashed line across,
     small brick text tag at right with NO background box (per feedback). */
  .chart .rec-line {
    stroke: var(--brick);
    stroke-opacity: .9;
    stroke-width: 1;
    stroke-dasharray: 4 4;
  }
  .chart .rec-tag-text {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: .16em;
    text-transform: uppercase;
    fill: var(--brick);
    font-weight: 500;
  }
  .chart .rec-tag-num {
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: -.02em;
    fill: var(--brick);
  }

  /* Subtle, elegant "alive" sway on the line group.
     Slow and small — a breath, not a bounce. */
  @keyframes chartSway {
    0%, 100% { transform: translateY(0); }
    50%     { transform: translateY(-1.6px); }
  }
  .chart .line-group {
    animation: chartSway 5.8s ease-in-out infinite;
    transform-origin: 50% 100%;
    transform-box: fill-box;
  }
  @media (prefers-reduced-motion: reduce) {
    .chart .line-group,
    .chart .point-current-pulse { animation: none !important; opacity: 0 !important; }
  }

  /* ===== Graceful: market snapshot coming soon ===== */
  .area--empty .area-stats,
  .area--empty .chart-wrap { display: none; }
  .area:not(.area--empty) .empty { display: none; }
  .area--empty .empty {
    margin-top: 18px;
    padding: 38px 28px;
    border: 1px solid var(--paper-line);
    border-radius: var(--r-md);
    background: var(--paper-card);
    text-align: center;
  }
  .area--empty .empty .icon {
    width: 26px; height: 26px;
    margin: 0 auto 14px;
    border-radius: 50%;
    border: 1px solid var(--paper-line);
    display: grid; place-items: center;
    color: var(--ink-faint);
  }
  .area--empty .empty .h {
    font-family: var(--display);
    font-size: 22px;
    line-height: 1.2;
    letter-spacing: -.01em;
    color: var(--ink);
    font-style: italic;
  }
  .area--empty .empty .p {
    font-family: var(--ui);
    font-size: 13px;

  }
  .legend a { color: var(--brick); text-decoration: none; }

  /* ============================================
     MOTION LAYER (CSS-first)
     Reveal ease + 3 durations · structural, never decorative
     ============================================ */
  :root {
    --r-ease: cubic-bezier(.16,.84,.3,1);
    --r-quick: 140ms;
    --r-std:   220ms;
    --r-slow:  360ms;
    --r-rise:  640ms; /* reveal duration */
  }

  /* ---- scroll-reveal primitives (restraint mode — opacity-only, no slide) ---- */
  .reveal {
    opacity: 0;
    transition: opacity 720ms var(--r-ease);
    will-change: opacity;
  }
  .reveal.in { opacity: 1; }
  /* stagger left intentionally as a no-op so legacy markup still works */
  .stagger > * { transition-delay: 0ms; }

  /* ---- hero Ken Burns (slow, barely-perceptible) ---- */
  .hero { overflow: hidden; }
  @keyframes kenburns {
    from { transform: scale(1) translate3d(0,0,0); }
    to   { transform: scale(1.035) translate3d(-1.2%, .8%, 0); }
  }

  /* ---- price reveal removed: hero price is always visible (no reveal animation) ---- */
  .price-reveal { opacity: 1 !important; -webkit-clip-path: none !important; clip-path: none !important; transform: none !important; }

  /* ---- CTA micro-interactions ---- */
  .cta .ar { transition: transform var(--r-quick) var(--r-ease), background var(--r-quick) var(--r-ease); }
  .cta:hover .ar { transform: translateX(3px); }
  .cta.primary:hover { background: #FFFCF4; }
  .cta.outline:hover { background: rgba(244,239,228,.08); border-color: rgba(244,239,228,.55); }

  /* ---- verified tick entrance (delayed) ---- */
  .agent-photo .verify {
    transform: scale(.3);
    opacity: 0;
    transition:
      transform 420ms var(--r-ease) 220ms,
      opacity 240ms ease-out 220ms;
  }
  .agent-photo.in .verify {
    transform: scale(1);
    opacity: 1;
  }

  /* ---- chart line draw-on ---- */
  .chart .area-fill {
    opacity: 0;
    transition: opacity 520ms var(--r-ease) 120ms;
  }
  .chart .line-stroke {
    stroke-dasharray: 600;
    stroke-dashoffset: 600;
    transition: stroke-dashoffset 1100ms var(--r-ease) 80ms;
  }
  .chart .point {
    opacity: 0;
    transform: scale(.5);
    transform-origin: center;
    transition: opacity 240ms var(--r-ease) 900ms, transform 320ms var(--r-ease) 900ms;
  }
  .chart.in .area-fill { opacity: 1; }
  .chart.in .line-stroke { stroke-dashoffset: 0; }
  .chart.in .point { opacity: 1; transform: scale(1); }

  /* ---- reduced motion ---- */
  @media (prefers-reduced-motion: reduce) {
    .reveal, .price-reveal, .agent-photo .verify,
    .chart .line-stroke, .chart .area-fill, .chart .point {
      opacity: 1 !important;
      transform: none !important;
      transition: none !important;
      -webkit-clip-path: none !important;
              clip-path: none !important;
      stroke-dashoffset: 0 !important;
    }
    .hero-photo { animation: none !important; }
  }
</style>

<script>
  /* ============================================
     MOTION CONTROLLER (CSS-first — IntersectionObserver)
     ============================================ */
  (function () {
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Helper: add .in to a node (and any chart/agent-photo grouping helpers)
    const reveal = (el) => {
      el.classList.add('in');
    };

    if (prefersReduced) {
      // surface everything immediately
      document.querySelectorAll('.reveal, .price-reveal, .chart, .agent-photo')
        .forEach(reveal);
      return;
    }

    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          reveal(entry.target);
          io.unobserve(entry.target);
        }
      });
    }, {
      rootMargin: '0px 0px -8% 0px',
      threshold: 0.12
    });

    // Observe revealable elements
    document.querySelectorAll('.reveal, .price-reveal, .chart, .agent-photo')
      .forEach((el) => io.observe(el));
  })();
</script>

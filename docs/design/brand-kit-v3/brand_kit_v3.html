<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brand kit v3 — settings</title>
<style>
  :root {
    --bg0:#131210; --bg1:#1C1A15; --bg2:#23201A; --bg3:#2C2922;
    --line:rgba(255,255,255,.10); --line2:rgba(255,255,255,.055);
    --tx1:#ECE7DD; --tx2:#A49E90; --tx3:#716C61;
    --link:#CBB596; --link-h:#E4D4B8;
    --ok:#86C29B; --warn:#E1A94E;
    --r:14px;
    --sans:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; }
  body {
    background:var(--bg0); color:var(--tx1); font-family:var(--sans);
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  ::selection { background:rgba(203,181,150,.28); }
  .link {
    background:none; border:none; padding:0; cursor:pointer;
    font:inherit; color:var(--link); font-size:12.5px; font-weight:500;
  }
  .link:hover { color:var(--link-h); }

  /* ---- mock scaffolding bar ---- */
  .mockbar {
    position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    padding:9px 20px; background:rgba(15,14,12,.86);
    border-bottom:1px solid var(--line2); backdrop-filter:blur(8px);
  }
  .mockbar__tag {
    font:600 9px/1 var(--mono); letter-spacing:.18em; text-transform:uppercase;
    color:var(--tx3); padding-right:4px;
  }
  .seg { display:flex; align-items:center; gap:8px; }
  .seg__label { font-size:11px; color:var(--tx2); }
  .seg__track { display:flex; background:var(--bg2); border:1px solid var(--line2); border-radius:7px; padding:2px; gap:2px; }
  .seg__btn {
    border:none; background:none; cursor:pointer; color:var(--tx2);
    font:500 11px/1 var(--sans); padding:4px 9px; border-radius:5px;
  }
  .seg__btn.is-on { background:var(--bg3); color:var(--tx1); box-shadow:0 1px 2px rgba(0,0,0,.3); }

  /* ---- shell ---- */
  .shell { max-width:1140px; margin:0 auto; padding:40px 24px 80px; }
  .shell--mobile { max-width:430px; }
  .hd { margin-bottom:30px; }
  .hd__eyebrow { font:600 10px/1 var(--mono); letter-spacing:.16em; text-transform:uppercase; color:var(--tx3); margin-bottom:12px; }
  .hd__title { font-size:30px; font-weight:700; letter-spacing:-.02em; margin:0; }
  .hd__sub { color:var(--tx2); font-size:14.5px; line-height:1.55; margin:9px 0 0; max-width:46ch; }

  .cols { display:grid; grid-template-columns:minmax(0,1fr) 332px; gap:44px; align-items:start; }
  .stack { display:flex; flex-direction:column; gap:26px; }
  .form { display:flex; flex-direction:column; gap:13px; }

  /* ---- generic block card ---- */
  .block { background:var(--bg1); border:1px solid var(--line2); border-radius:var(--r); padding:17px 18px; }
  .block__head { display:flex; align-items:center; gap:10px; }
  .block__title { font-size:14px; font-weight:600; margin:0; letter-spacing:-.01em; }
  .block__sub { color:var(--tx2); font-size:12.5px; line-height:1.5; margin:4px 0 14px; }
  .block__tag { margin-left:auto; font:600 9px/1 var(--mono); letter-spacing:.1em; text-transform:uppercase; color:var(--tx3); background:var(--bg2); padding:4px 7px; border-radius:5px; }
  .block .link { margin-left:auto; }

  /* ---- color field ---- */
  .cfield { display:flex; align-items:center; gap:13px; }
  .cfield + .cfield { margin-top:11px; }
  .cfield__swatch {
    position:relative; width:38px; height:38px; flex:0 0 auto; border-radius:9px;
    border:1px solid rgba(255,255,255,.18); cursor:pointer; padding:0;
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.25);
  }
  .cfield__native { position:absolute; inset:0; opacity:0; width:100%; height:100%; border:none; cursor:pointer; }
  .cfield__body { flex:1 1 auto; min-width:0; }
  .cfield__label { font-size:13px; font-weight:500; }
  .cfield__hint { font-size:11.5px; color:var(--tx2); margin-top:2px; }
  .cfield__hexwrap { display:flex; align-items:center; background:var(--bg2); border:1px solid var(--line); border-radius:8px; padding:0 9px 0 10px; height:34px; }
  .cfield__hexwrap:focus-within { border-color:var(--link); }
  .cfield__hash { font:500 12px/1 var(--mono); color:var(--tx3); }
  .cfield__hex { width:68px; border:none; background:none; outline:none; color:var(--tx1); font:500 12.5px/1 var(--mono); letter-spacing:.06em; text-transform:uppercase; padding:8px 2px 8px 4px; }

  /* ---- logo suggestions ---- */
  .suggest { margin-top:15px; padding-top:14px; border-top:1px dashed var(--line); }
  .suggest__copy { font-size:12px; color:var(--tx2); margin-bottom:9px; }
  .suggest__empty { font-size:12px; color:var(--tx2); line-height:1.55; }
  .suggest__row { display:flex; gap:8px; }
  .suggest__chip {
    width:28px; height:28px; border-radius:7px; cursor:pointer; padding:0;
    border:1px solid rgba(255,255,255,.16); position:relative;
    display:flex; align-items:center; justify-content:center;
    transition:transform .12s ease;
  }
  .suggest__chip:hover { transform:translateY(-1px); }
  .suggest__chip.is-active { box-shadow:0 0 0 2px var(--bg1),0 0 0 3.5px var(--link); }
  .suggest__tick { color:#fff; font-size:13px; text-shadow:0 1px 2px rgba(0,0,0,.6); }

  /* ---- palette strip ---- */
  .strip { display:grid; grid-template-columns:repeat(6,1fr); gap:7px; }
  .strip__chip { display:flex; flex-direction:column; gap:5px; }
  .strip__sw { height:34px; border-radius:7px; border:1px solid rgba(255,255,255,.10); }
  .strip__role { font:600 8.5px/1 var(--mono); letter-spacing:.08em; text-transform:uppercase; color:var(--tx2); }
  .strip__hex { font:500 8.5px/1 var(--mono); color:var(--tx3); letter-spacing:.02em; }

  /* ---- disclosure ---- */
  .disc__head { display:flex; align-items:center; gap:10px; width:100%; background:none; border:none; cursor:pointer; padding:0; color:var(--tx1); text-align:left; }
  .disc__chev { font-size:16px; color:var(--tx2); transition:transform .15s ease; line-height:1; }
  .disc__preview { display:flex; gap:4px; margin-left:auto; }
  .disc__dot { width:15px; height:15px; border-radius:5px; border:1px solid rgba(255,255,255,.18); }
  .disc__hint { font-size:11.5px; color:var(--tx3); padding-left:2px; }
  .disc__body { margin-top:14px; padding-top:15px; border-top:1px solid var(--line2); }

  /* ---- layouts ---- */
  .layouts { display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
  .layout { background:var(--bg2); border:1px solid var(--line2); border-radius:10px; padding:12px 11px 11px; cursor:pointer; text-align:left; transition:border-color .12s; }
  .layout:hover { border-color:var(--line); }
  .layout.is-active { border-color:var(--link); background:var(--bg3); }
  .layout__glyph { display:flex; gap:3px; height:26px; margin-bottom:9px; }
  .layout__glyph i { background:var(--tx3); border-radius:2px; display:block; }
  .layout.is-active .layout__glyph i { background:var(--link); }
  .layout__glyph--spotlight { flex-direction:column; }
  .layout__glyph--spotlight i:first-child { height:13px; } .layout__glyph--spotlight i { height:5px; width:100%; }
  .layout__glyph--grid i { width:calc(50% - 1.5px); height:100%; } .layout__glyph--grid i:nth-child(3){ display:none; }
  .layout__glyph--list i { width:100%; height:6px; } .layout__glyph--list { flex-direction:column; }
  .layout__name { display:block; font-size:12.5px; font-weight:600; }
  .layout__desc { display:block; font-size:10.5px; color:var(--tx2); margin-top:2px; }

  /* ---- readability ---- */
  .readab { border-radius:var(--r); border:1px solid var(--line2); background:var(--bg1); overflow:hidden; }
  .readab.is-warn { border-color:rgba(225,169,78,.45); background:linear-gradient(180deg,rgba(225,169,78,.07),transparent 60%),var(--bg1); }
  .readab__head { display:flex; align-items:center; gap:12px; width:100%; background:none; border:none; cursor:pointer; padding:16px 18px; color:var(--tx1); text-align:left; }
  .readab.is-warn .readab__head { cursor:default; }
  .readab__mark { flex:0 0 auto; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; }
  .readab.is-ok .readab__mark { background:rgba(134,194,155,.16); color:var(--ok); }
  .readab.is-warn .readab__mark { background:rgba(225,169,78,.18); color:var(--warn); }
  .readab__verdict { display:flex; flex-direction:column; gap:2px; }
  .readab__verdict strong { font-size:13.5px; font-weight:600; }
  .readab__verdict span { font-size:12px; color:var(--tx2); }
  .readab__toggle { margin-left:auto; font-size:12px; color:var(--link); white-space:nowrap; }
  .readab__body { padding:0 18px 16px; }
  .readab__list { list-style:none; margin:0 0 4px; padding:12px 0 0; border-top:1px solid var(--line2); display:flex; flex-direction:column; gap:9px; }
  .readab__item { display:flex; align-items:center; gap:9px; font-size:12px; }
  .readab__dot { width:7px; height:7px; border-radius:50%; background:var(--ok); flex:0 0 auto; }
  .readab__item.is-fail .readab__dot { background:var(--warn); }
  .readab__itemlabel { color:var(--tx1); }
  .readab__adjusted { color:var(--tx3); font-style:italic; margin-left:6px; font-size:11px; }
  .readab__ratio { margin-left:auto; font:500 11px/1 var(--mono); color:var(--tx2); }
  .readab__fix { font-size:12px; color:var(--tx2); line-height:1.55; margin:12px 0 0; }
  .readab__fix strong { color:var(--tx1); font-weight:600; }
  .readab__fix--quiet { color:var(--tx3); }

  /* ---- brand ready ---- */
  .ready { display:flex; align-items:flex-start; gap:12px; border-radius:var(--r); padding:15px 18px; border:1px solid var(--line2); }
  .ready.is-complete { background:linear-gradient(180deg,rgba(134,194,155,.08),transparent 70%),var(--bg1); border-color:rgba(134,194,155,.30); }
  .ready.is-incomplete { background:var(--bg1); }
  .ready__mark { flex:0 0 auto; width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; background:rgba(134,194,155,.16); color:var(--ok); margin-top:1px; }
  .ready.is-incomplete .ready__mark { background:var(--bg3); }
  .ready__body { display:flex; flex-direction:column; gap:3px; }
  .ready__body strong { font-size:13.5px; font-weight:600; }
  .ready__body span { font-size:12.5px; color:var(--tx2); line-height:1.5; }

  /* ---- save + scope ---- */
  .save { padding:4px 2px 0; }
  .save__row { display:flex; align-items:center; gap:8px; }
  .save__spin { width:16px; height:16px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--ok); background:rgba(134,194,155,.16); }
  .save__spin.save--saving { background:none; border:1.6px solid var(--line); border-top-color:var(--link); animation:spin .7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .save__label { font-size:12.5px; color:var(--tx2); }
  .save__scope { font-size:11.5px; color:var(--tx3); line-height:1.5; margin:7px 0 0; padding-left:24px; max-width:52ch; }

  /* ---- secondary saved (conditional quiet line) ---- */
  .secondary { font-size:12px; color:var(--tx2); padding:11px 16px; background:var(--bg1); border:1px solid var(--line2); border-radius:10px; display:flex; align-items:center; gap:9px; }
  .secondary::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--tx3); }

  /* ---- preview column ---- */
  .previewcol { display:flex; flex-direction:column; align-items:center; }
  .previewcol__cap { align-self:flex-start; font:600 10px/1 var(--mono); letter-spacing:.12em; text-transform:uppercase; color:var(--tx3); margin-bottom:14px; }
  .phone { width:284px; background:#0b0a09; border-radius:34px; padding:9px; border:1px solid rgba(255,255,255,.10); box-shadow:0 24px 60px -24px rgba(0,0,0,.7); position:relative; }
  .phone__notch { position:absolute; top:9px; left:50%; transform:translateX(-50%); width:96px; height:20px; background:#0b0a09; border-radius:0 0 13px 13px; z-index:2; }
  .phone__screen { border-radius:26px; overflow:hidden; background:#fff; }
  .samplebtn { margin-top:20px; width:100%; max-width:284px; display:flex; align-items:center; justify-content:center; gap:8px; background:var(--bg2); color:var(--tx1); border:1px solid var(--line); border-radius:10px; padding:11px 14px; font:600 13px/1 var(--sans); cursor:pointer; transition:background .12s,border-color .12s; }
  .samplebtn:hover { background:var(--bg3); border-color:var(--link); }
  .samplebtn__ext { font-size:14px; color:var(--link); }
  .previewcol__note { font-size:11px; color:var(--tx3); margin:9px 0 0; text-align:center; max-width:284px; line-height:1.5; }

  .stack .previewcol__cap { align-self:flex-start; }

  @media (max-width:820px) {
    .cols { grid-template-columns:1fr; gap:30px; }
    .strip { grid-template-columns:repeat(3,1fr); }
    .mockbar { gap:12px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="js/color-utils.js"></script>
  <script type="text/babel" src="js/preview.jsx"></script>
  <script type="text/babel" src="js/components.jsx"></script>
  <script type="text/babel" src="js/status.jsx"></script>
  <script type="text/babel" src="js/app.jsx"></script>
</body>
</html>
